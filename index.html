<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SML Карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a, #0a1a3a);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .card {
            background: #1a2a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .menu-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .menu-btn {
            flex: 1;
            background: #2a3a5a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-btn.active { background: #e94560; }
        .pack-btn {
            background: linear-gradient(135deg, #e94560, #b52b43);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .shop-item, .team-slot {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-price {
            background: #ffd966;
            color: #1a2a4a;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .shop-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        .result-area {
            background: #0f1422;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .player-name { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .stars { font-size: 32px; margin: 10px 0; }
        .timer { font-size: 14px; color: #aaa; margin-top: 15px; text-align: center; }
        .collection-list { max-height: 400px; overflow-y: auto; text-align: left; }
        .team-summary {
            background: #0f1422;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        .hidden { display: none; }
        select {
            background: #2a3a5a;
            color: white;
            padding: 8px;
            border-radius: 10px;
            border: none;
            margin-left: 10px;
            width: 180px;
        }
        .opponent-card {
            background: #1a2a4a;
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showSection('pack')">📦 Пак</button>
            <button class="menu-btn" onclick="showSection('collection')">📋 Коллекция</button>
            <button class="menu-btn" onclick="showSection('shop')">🛒 Магазин</button>
            <button class="menu-btn" onclick="showSection('tournament')">🏆 Турнир</button>
        </div>

        <div id="packSection" class="card">
            <button class="pack-btn" onclick="openFreePack()">📦 ОТКРЫТЬ БЕСПЛАТНЫЙ ПАК</button>
            <div class="timer" id="timer">✅ Пак доступен</div>
            <div id="packResult" class="result-area"><p>Нажми кнопку</p></div>
        </div>

        <div id="collectionSection" class="card hidden">
            <h3>🎴 Коллекция</h3>
            <div id="collectionList" class="collection-list"><p>Загрузка...</p></div>
        </div>

        <div id="shopSection" class="card hidden">
            <h3>🛒 Магазин паков</h3>
            <div class="shop-item">
                <div><b>⭐ Пак 1⭐</b><br><small>Гарант 1⭐</small></div>
                <div class="shop-price">5 ⭐</div>
                <button class="shop-btn" onclick="buyPack(1, 5)">Купить</button>
            </div>
            <div class="shop-item">
                <div><b>⭐⭐ Пак 2⭐</b><br><small>Гарант 2⭐</small></div>
                <div class="shop-price">15 ⭐</div>
                <button class="shop-btn" onclick="buyPack(2, 15)">Купить</button>
            </div>
            <div class="shop-item">
                <div><b>⭐⭐⭐ Пак 3⭐</b><br><small>Гарант 3⭐</small></div>
                <div class="shop-price">30 ⭐</div>
                <button class="shop-btn" onclick="buyPack(3, 30)">Купить</button>
            </div>
            <div id="shopResult" class="result-area"><p>Выбери пак</p></div>
        </div>

        <div id="tournamentSection" class="card hidden">
            <h3>🏆 ЛИГА ЧЕМПИОНОВ 🏆</h3>
            <div class="team-slot"><span>⚽ Нападающий:</span><select id="forwardSelect" onchange="updateTeamPower()"><option value="">-- выбрать --</option></select></div>
            <div class="team-slot"><span>🎯 Полузащитник:</span><select id="midfielderSelect" onchange="updateTeamPower()"><option value="">-- выбрать --</option></select></div>
            <div class="team-slot"><span>🛡️ Защитник:</span><select id="defenderSelect" onchange="updateTeamPower()"><option value="">-- выбрать --</option></select></div>
            <div class="team-slot"><span>🧤 Вратарь:</span><select id="goalkeeperSelect" onchange="updateTeamPower()"><option value="">-- выбрать --</option></select></div>
            <div class="team-summary" id="teamPower">💪 Суммарная сила: 0</div>
            <button class="pack-btn" onclick="startTournament()">🏆 СТАРТ ТУРНИРА</button>
            <div id="tournamentResult" class="result-area"><p>Выбери состав и нажми "Старт турнира"</p></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        // Сила по звёздам
        const playerPower = {1:10, 2:20, 3:35, 4:50, 5:75, 6:100};
        
        // ИГРОКИ С ПОЗИЦИЯМИ
        const playersData = {
            1: [
                { name: "Fati", position: "forward", stars: 1 },
                { name: "Pedri", position: "midfielder", stars: 1 },
                { name: "Gavi", position: "midfielder", stars: 1 },
                { name: "Camavinga", position: "midfielder", stars: 1 },
                { name: "Moukoko", position: "forward", stars: 1 },
                { name: "Bellingham", position: "midfielder", stars: 1 }
            ],
            2: [
                { name: "Odegaard", position: "midfielder", stars: 2 },
                { name: "Saka", position: "forward", stars: 2 },
                { name: "Foden", position: "midfielder", stars: 2 },
                { name: "Musiala", position: "midfielder", stars: 2 },
                { name: "Wirtz", position: "midfielder", stars: 2 },
                { name: "Kvaratskhelia", position: "forward", stars: 2 }
            ],
            3: [
                { name: "Rodri", position: "midfielder", stars: 3 },
                { name: "Kimmich", position: "midfielder", stars: 3 },
                { name: "Bernardo Silva", position: "midfielder", stars: 3 },
                { name: "Vinicius Jr", position: "forward", stars: 3 },
                { name: "Salah", position: "forward", stars: 3 },
                { name: "Kane", position: "forward", stars: 3 }
            ],
            4: [
                { name: "Van Dijk", position: "defender", stars: 4 },
                { name: "Courtois", position: "goalkeeper", stars: 4 },
                { name: "De Bruyne", position: "midfielder", stars: 4 },
                { name: "Benzema", position: "forward", stars: 4 },
                { name: "Modric", position: "midfielder", stars: 4 },
                { name: "Neymar", position: "forward", stars: 4 }
            ],
            5: [
                { name: "Haaland", position: "forward", stars: 5 },
                { name: "Mbappe", position: "forward", stars: 5 },
                { name: "Ronaldo", position: "forward", stars: 5 },
                { name: "Lewandowski", position: "forward", stars: 5 }
            ],
            6: [
                { name: "Messi", position: "forward", stars: 6 },
                { name: "Ronaldinho", position: "midfielder", stars: 6 },
                { name: "Zidane", position: "midfielder", stars: 6 },
                { name: "Cruyff", position: "forward", stars: 6 },
                { name: "Maradona", position: "midfielder", stars: 6 },
                { name: "Pele", position: "forward", stars: 6 }
            ]
        };
        
        const starsMap = {1:"⭐",2:"⭐⭐",3:"⭐⭐⭐",4:"⭐⭐⭐⭐",5:"⭐⭐⭐⭐⭐",6:"⭐⭐⭐⭐⭐⭐"};
        
        // Получить информацию об игроке
        function getPlayerInfo(name) {
            for (let s = 1; s <= 6; s++) {
                let player = playersData[s].find(p => p.name === name);
                if (player) return player;
            }
            return null;
        }
        
        function getPlayerPowerByName(name) {
            let info = getPlayerInfo(name);
            return info ? playerPower[info.stars] : 0;
        }
        
        function getPlayerStars(name) {
            let info = getPlayerInfo(name);
            return info ? info.stars : 0;
        }
        
        function getData() {
            return {
                collection: JSON.parse(localStorage.getItem('collection') || '[]'),
                lastOpen: parseInt(localStorage.getItem('lastOpen') || '0')
            };
        }
        
        function saveData(collection, lastOpen) {
            localStorage.setItem('collection', JSON.stringify(collection));
            if (lastOpen !== undefined) localStorage.setItem('lastOpen', lastOpen);
        }
        
        function getRandomPlayerByStars(stars) {
            let list = playersData[stars];
            return list[Math.floor(Math.random() * list.length)];
        }
        
        function getRarity() {
            let r = Math.floor(Math.random() * 100) + 1;
            if (r <= 48) return 1;
            if (r <= 79) return 2;
            if (r <= 91) return 3;
            if (r <= 96) return 4;
            if (r <= 99) return 5;
            return 6;
        }
        
        function openFreePack() {
            let data = getData();
            let now = Date.now();
            if (data.lastOpen && now - data.lastOpen < 3600000) {
                let left = 3600000 - (now - data.lastOpen);
                tg.showAlert(`⏳ Подожди ${Math.floor(left/60000)}:${Math.floor((left%60000)/1000).toString().padStart(2,'0')}`);
                return;
            }
            let stars = getRarity();
            let player = getRandomPlayerByStars(stars);
            data.collection.push({ name: player.name, stars: player.stars, position: player.position });
            saveData(data.collection, now);
            let html = `<h2>🎴 ВЫПАЛО!</h2><div class="player-name">${player.name}</div><div class="stars">${starsMap[player.stars]}</div><div>${player.position === 'forward' ? '⚽ Нападающий' : player.position === 'midfielder' ? '🎯 Полузащитник' : player.position === 'defender' ? '🛡️ Защитник' : '🧤 Вратарь'}</div>`;
            document.getElementById('packResult').innerHTML = html;
            tg.showAlert(`🎴 ${player.name} (${starsMap[player.stars]})`);
            updateTimer();
            updateTeamSelectors();
        }
        
        async function buyPack(guaranteedStars, price) {
            try {
                tg.openInvoice({
                    title: `Пак ${guaranteedStars}⭐`,
                    description: `Гарантированный игрок ${guaranteedStars}⭐`,
                    payload: JSON.stringify({ stars: guaranteedStars }),
                    provider_token: '',
                    currency: 'XTR',
                    prices: [{ label: 'Пак', amount: price }]
                });
                tg.onEvent('invoiceClosed', (data) => {
                    if (data.status === 'paid') {
                        let player = getRandomPlayerByStars(guaranteedStars);
                        let coll = getData().collection;
                        coll.push({ name: player.name, stars: player.stars, position: player.position });
                        saveData(coll);
                        let html = `<h2>🎴 ВЫПАЛО!</h2><div class="player-name">${player.name}</div><div class="stars">${starsMap[player.stars]}</div>`;
                        document.getElementById('shopResult').innerHTML = html;
                        tg.showAlert(`🎴 Куплен пак ${guaranteedStars}⭐! ${player.name}`);
                        updateTeamSelectors();
                    } else tg.showAlert('❌ Отмена');
                });
            } catch(e) { tg.showAlert('Ошибка'); }
        }
        
        function showCollection() {
            let coll = getData().collection;
            if (!coll.length) { document.getElementById('collectionList').innerHTML = '<p>📭 Нет карточек</p>'; return; }
            let grouped = {1:[],2:[],3:[],4:[],5:[],6:[]};
            coll.forEach(c => grouped[c.stars].push(c.name));
            let html = '';
            for (let i=1;i<=6;i++) if (grouped[i].length) html += `<div style="margin-top:15px"><b>${starsMap[i]}</b> — ${grouped[i].length} шт.<div style="margin-left:15px;font-size:14px;color:#aaa">${grouped[i].join(', ')}</div></div>`;
            html += `<div style="margin-top:15px;font-weight:bold">Всего: ${coll.length}</div>`;
            document.getElementById('collectionList').innerHTML = html;
        }
        
        function updateTeamSelectors() {
            let coll = getData().collection;
            
            // Фильтруем по позициям
            let forwards = coll.filter(c => getPlayerInfo(c.name)?.position === 'forward');
            let midfielders = coll.filter(c => getPlayerInfo(c.name)?.position === 'midfielder');
            let defenders = coll.filter(c => getPlayerInfo(c.name)?.position === 'defender');
            let goalkeepers = coll.filter(c => getPlayerInfo(c.name)?.position === 'goalkeeper');
            
            function updateSelect(selectId, list, currentValue) {
                let sel = document.getElementById(selectId);
                sel.innerHTML = '<option value="">-- выбрать --</option>';
                list.forEach(c => {
                    let info = getPlayerInfo(c.name);
                    let opt = document.createElement('option');
                    opt.value = c.name;
                    opt.textContent = `${c.name} (${starsMap[info.stars]})`;
                    sel.appendChild(opt);
                });
                if (currentValue && list.some(c => c.name === currentValue)) {
                    sel.value = currentValue;
                } else {
                    sel.value = '';
                }
            }
            
            let currentForward = document.getElementById('forwardSelect').value;
            let currentMidfielder = document.getElementById('midfielderSelect').value;
            let currentDefender = document.getElementById('defenderSelect').value;
            let currentGoalkeeper = document.getElementById('goalkeeperSelect').value;
            
            updateSelect('forwardSelect', forwards, currentForward);
            updateSelect('midfielderSelect', midfielders, currentMidfielder);
            updateSelect('defenderSelect', defenders, currentDefender);
            updateSelect('goalkeeperSelect', goalkeepers, currentGoalkeeper);
            
            updateTeamPower();
        }
        
        function updateTeamPower() {
            let forward = document.getElementById('forwardSelect').value;
            let midfielder = document.getElementById('midfielderSelect').value;
            let defender = document.getElementById('defenderSelect').value;
            let goalkeeper = document.getElementById('goalkeeperSelect').value;
            
            let power = getPlayerPowerByName(forward) + getPlayerPowerByName(midfielder) + 
                        getPlayerPowerByName(defender) + getPlayerPowerByName(goalkeeper);
            
            document.getElementById('teamPower').innerHTML = `💪 Суммарная сила: ${power}`;
        }
        
        function getRandomPlayerByPosition(collection, position, excludeNames = []) {
            let available = collection.filter(c => {
                let info = getPlayerInfo(c.name);
                return info && info.position === position && !excludeNames.includes(c.name);
            });
            if (available.length === 0) return null;
            return available[Math.floor(Math.random() * available.length)];
        }
        
        function generateRandomOpponent(stage, myCollection) {
            let minStars = stage === '1/8' ? 1 : stage === '1/4' ? 2 : stage === '1/2' ? 3 : 4;
            let maxStars = stage === '1/8' ? 3 : stage === '1/4' ? 4 : stage === '1/2' ? 5 : 6;
            
            let team = { forward: null, midfielder: null, defender: null, goalkeeper: null };
            let usedPlayers = [];
            
            let positions = ['forward', 'midfielder', 'defender', 'goalkeeper'];
            for (let pos of positions) {
                let available = myCollection.filter(c => {
                    let info = getPlayerInfo(c.name);
                    return info && info.position === pos && !usedPlayers.includes(c.name);
                });
                
                if (available.length === 0) {
                    // Если нет игроков нужной позиции — создаём случайного
                    let stars = minStars + Math.floor(Math.random() * (maxStars - minStars + 1));
                    let playersAtStars = playersData[stars].filter(p => p.position === pos);
                    if (playersAtStars.length === 0) {
                        playersAtStars = playersData[stars];
                    }
                    let randomPlayer = playersAtStars[Math.floor(Math.random() * playersAtStars.length)];
                    team[pos] = { name: randomPlayer.name, stars: randomPlayer.stars };
                    usedPlayers.push(randomPlayer.name);
                } else {
                    let randomCard = available[Math.floor(Math.random() * available.length)];
                    team[pos] = { name: randomCard.name, stars: randomCard.stars };
                    usedPlayers.push(randomCard.name);
                }
            }
            
            let power = getPlayerPowerByName(team.forward.name) +
                        getPlayerPowerByName(team.midfielder.name) +
                        getPlayerPowerByName(team.defender.name) +
                        getPlayerPowerByName(team.goalkeeper.name);
            
            return { team, power };
        }
        
        function startTournament() {
            let forward = document.getElementById('forwardSelect').value;
            let midfielder = document.getElementById('midfielderSelect').value;
            let defender = document.getElementById('defenderSelect').value;
            let goalkeeper = document.getElementById('goal
