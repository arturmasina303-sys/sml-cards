<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SML Карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Monetag SDK -->
    <script src='https://static.monetag.io/sdk.js' data-zone='10759776' data-sdk='show_10759776'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a, #0a1a3a);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .card {
            background: #1a2a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .menu-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .menu-btn {
            flex: 1;
            background: #2a3a5a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-btn.active { background: #e94560; }
        .pack-btn {
            background: linear-gradient(135deg, #e94560, #b52b43);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .ad-pack-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        .result-area {
            background: #0f1422;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .card-img {
            width: 200px;
            max-width: 100%;
            border-radius: 15px;
            margin: 10px auto;
            display: block;
        }
        .timer { font-size: 14px; color: #aaa; margin-top: 15px; text-align: center; }
        .collection-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }
        .collection-card {
            width: 100px;
            background: #0f1422;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
        }
        .collection-card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }
        .collection-card .name {
            font-size: 11px;
            margin-top: 5px;
            color: #ffd966;
        }
        .ad-limit {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
        }
        .balance {
            background: #0f1422;
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .shop-item {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-price {
            background: #ffd966;
            color: #1a2a4a;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .shop-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showSection('pack')">📦 Пак</button>
            <button class="menu-btn" onclick="showSection('collection')">📋 Коллекция</button>
            <button class="menu-btn" onclick="showSection('shop')">🛒 Магазин</button>
        </div>

        <div id="packSection" class="card">
            <div class="balance">🪙 Монеты: <span id="coinBalance">0</span></div>
            <button class="pack-btn" onclick="openFreePack()">📦 БЕСПЛАТНЫЙ ПАК (раз/2ч)</button>
            <div class="timer" id="timer">✅ Пак доступен</div>
            <button class="pack-btn ad-pack-btn" onclick="openAdPack()">🎥 РЕКЛАМНЫЙ ПАК (7/день)</button>
            <div class="ad-limit" id="adLimitDisplay">🎥 Осталось рекламных паков: 7</div>
            <button class="pack-btn" onclick="watchAdForCoins()">💰 РЕКЛАМА ЗА МОНЕТЫ (50) (2/день)</button>
            <div class="ad-limit" id="coinAdLimitDisplay">💰 Осталось реклам за монеты: 2</div>
            <div id="packResult" class="result-area"><p>Нажми кнопку</p></div>
        </div>

        <div id="collectionSection" class="card hidden">
            <h3>🎴 Моя коллекция</h3>
            <div id="collectionGrid" class="collection-grid"><p>Загрузка...</p></div>
        </div>

        <div id="shopSection" class="card hidden">
            <h3>🛒 МАГАЗИН</h3>
            <div class="balance">🪙 Монеты: <span id="shopCoinBalance">0</span></div>
            <div class="shop-item">
                <div><b>Аршавин</b><br><small>3⭐ | Рейтинг 82 | Арсенал | Россия</small></div>
                <div class="shop-price">1250 🪙</div>
                <button class="shop-btn" onclick="buyArshavin()">Купить</button>
            </div>
            <div id="shopResult" class="result-area"><p>Выбери товар для покупки</p></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        const ZONE_ID = "10759776";
        
        // ТОЛЬКО 10 игроков 1⭐
        const allCards = [
            { name: "Fabio Silva", img: "fabio_silva.jpg", stars: 1, rating: 69 },
            { name: "Kolo Muani", img: "kolo_muani.jpg", stars: 1, rating: 68 },
            { name: "Gimenez", img: "gimenez.jpg", stars: 1, rating: 68 },
            { name: "Lindelof", img: "lindelof.jpg", stars: 1, rating: 68 },
            { name: "Kubo", img: "kubo.jpg", stars: 1, rating: 67 },
            { name: "Lemar", img: "lemar.jpg", stars: 1, rating: 66 },
            { name: "Bonny", img: "bonny.jpg", stars: 1, rating: 66 },
            { name: "Kraft", img: "kraft.jpg", stars: 1, rating: 65 },
            { name: "Evans", img: "evans.jpg", stars: 1, rating: 65 },
            { name: "Giroud", img: "giroud.jpg", stars: 1, rating: 65 }
        ];
        
        const rarityChance = [
            { stars: 1, chance: 100 },
            { stars: 2, chance: 0 },
            { stars: 3, chance: 0 },
            { stars: 4, chance: 0 },
            { stars: 5, chance: 0 },
            { stars: 6, chance: 0 }
        ];
        
        function getRandomCard() {
            return allCards[Math.floor(Math.random() * allCards.length)];
        }
        
        function getData() {
            return {
                collection: JSON.parse(localStorage.getItem('collection') || '[]'),
                lastOpen: parseInt(localStorage.getItem('lastOpen') || '0'),
                adPacksToday: parseInt(localStorage.getItem('adPacksToday') || '0'),
                lastAdDate: localStorage.getItem('lastAdDate') || '',
                coins: parseInt(localStorage.getItem('coins') || '0'),
                coinAdsToday: parseInt(localStorage.getItem('coinAdsToday') || '0'),
                lastCoinAdDate: localStorage.getItem('lastCoinAdDate') || ''
            };
        }
        
        function saveData(collection, lastOpen, adPacksToday, lastAdDate, coins, coinAdsToday, lastCoinAdDate) {
            localStorage.setItem('collection', JSON.stringify(collection));
            if (lastOpen !== undefined) localStorage.setItem('lastOpen', lastOpen);
            if (adPacksToday !== undefined) localStorage.setItem('adPacksToday', adPacksToday);
            if (lastAdDate !== undefined) localStorage.setItem('lastAdDate', lastAdDate);
            if (coins !== undefined) localStorage.setItem('coins', coins);
            if (coinAdsToday !== undefined) localStorage.setItem('coinAdsToday', coinAdsToday);
            if (lastCoinAdDate !== undefined) localStorage.setItem('lastCoinAdDate', lastCoinAdDate);
            updateBalanceDisplay();
        }
        
        function resetAdCounterIfNewDay() {
            let data = getData();
            let today = new Date().toDateString();
            if (data.lastAdDate !== today) {
                data.adPacksToday = 0;
                data.lastAdDate = today;
                saveData(data.collection, data.lastOpen, 0, today, data.coins, data.coinAdsToday, data.lastCoinAdDate);
            }
            if (data.lastCoinAdDate !== today) {
                data.coinAdsToday = 0;
                data.lastCoinAdDate = today;
                saveData(data.collection, data.lastOpen, data.adPacksToday, data.lastAdDate, data.coins, 0, today);
            }
            updateAdLimitDisplay();
            updateCoinAdLimitDisplay();
        }
        
        function updateAdLimitDisplay() {
            let data = getData();
            let remaining = 7 - (data.adPacksToday || 0);
            let el = document.getElementById('adLimitDisplay');
            if (el) el.innerHTML = `🎥 Осталось рекламных паков: ${remaining}`;
        }
        
        function updateCoinAdLimitDisplay() {
            let data = getData();
            let remaining = 2 - (data.coinAdsToday || 0);
            let el = document.getElementById('coinAdLimitDisplay');
            if (el) el.innerHTML = `💰 Осталось реклам за монеты: ${remaining}`;
        }
        
        function updateBalanceDisplay() {
            let data = getData();
            let coinEl = document.getElementById('coinBalance');
            let shopCoinEl = document.getElementById('shopCoinBalance');
            if (coinEl) coinEl.innerText = data.coins;
            if (shopCoinEl) shopCoinEl.innerText = data.coins;
        }
        
        function giveAdPackReward() {
            let data = getData();
            let card = getRandomCard();
            data.collection.push(card);
            data.adPacksToday++;
            saveData(data.collection, data.lastOpen, data.adPacksToday, data.lastAdDate, data.coins, data.coinAdsToday, data.lastCoinAdDate);
            updateAdLimitDisplay();
            
            let imgHtml = card.img ? `<img class="card-img" src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">` : '';
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 РЕКЛАМНЫЙ ПАК!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 Рекламный пак: ${card.name} (${'⭐'.repeat(card.stars)})`);
        }
        
        function openAdPack() {
            resetAdCounterIfNewDay();
            let data = getData();
            
            if (data.adPacksToday >= 7) {
                tg.showAlert('❌ Лимит на сегодня (7 паков) исчерпан! Завтра будут новые.');
                return;
            }
            
            if (typeof monetag !== 'undefined') {
                monetag('showRewardedAd', ZONE_ID, function(success) {
                    if (success) {
                        giveAdPackReward();
                    } else {
                        tg.showAlert('❌ Реклама не была просмотрена до конца.');
                    }
                });
            } else {
                tg.showAlert('🎥 Тестовый режим: реклама пропущена.');
                giveAdPackReward();
            }
        }
        
        function openFreePack() {
            let data = getData();
            let now = Date.now();
            let twoHours = 2 * 60 * 60 * 1000;
            
            if (data.lastOpen && now - data.lastOpen < twoHours) {
                let left = twoHours - (now - data.lastOpen);
                let hours = Math.floor(left / 3600000);
                let minutes = Math.floor((left % 3600000) / 60000);
                tg.showAlert(`⏳ Подожди ${hours}ч ${minutes}мин до следующего бесплатного пака`);
                return;
            }
            
            let card = getRandomCard();
            data.collection.push(card);
            saveData(data.collection, now, data.adPacksToday, data.lastAdDate, data.coins, data.coinAdsToday, data.lastCoinAdDate);
            
            let imgHtml = card.img ? `<img class="card-img" src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">` : '';
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 ВЫПАЛО!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 ${card.name} (${'⭐'.repeat(card.stars)})`);
            updateTimer();
        }
        
        function watchAdForCoins() {
            resetAdCounterIfNewDay();
            let data = getData();
            
            if (data.coinAdsToday >= 2) {
                tg.showAlert('❌ Лимит на сегодня (2 раза) исчерпан! Завтра будут новые.');
                return;
            }
            
            function addCoins() {
                let newCoins = data.coins + 50;
                data.coinAdsToday++;
                saveData(data.collection, data.lastOpen, data.adPacksToday, data.lastAdDate, newCoins, data.coinAdsToday, data.lastCoinAdDate);
                updateCoinAdLimitDisplay();
                updateBalanceDisplay();
                document.getElementById('packResult').innerHTML = `<h2>💰 +50 МОНЕТ!</h2><p>Баланс: ${newCoins} монет</p>`;
                tg.showAlert(`💰 +50 монет! Баланс: ${newCoins}`);
            }
            
            if (typeof monetag !== 'undefined') {
                monetag('showRewardedAd', ZONE_ID, function(success) {
                    if (success) {
                        addCoins();
                    } else {
                        tg.showAlert('❌ Реклама не была просмотрена до конца.');
                    }
                });
            } else {
                tg.showAlert('🎥 Тестовый режим: реклама пропущена.');
                addCoins();
            }
        }
        
        function buyArshavin() {
            let data = getData();
            let price = 1250;
            
            if (data.coins < price) {
                tg.showAlert(`❌ Не хватает монет! Нужно ${price}, у тебя ${data.coins}`);
                return;
            }
            
            let newCoins = data.coins - price;
            let arshavin = { name: "Arshavin", img: "arshavin.jpg", stars: 3, rating: 82 };
            data.collection.push(arshavin);
            saveData(data.collection, data.lastOpen, data.adPacksToday, data.lastAdDate, newCoins, data.coinAdsToday, data.lastCoinAdDate);
            
            let imgHtml = `<img class="card-img" src="arshavin.jpg" alt="Arshavin" onerror="this.style.display='none'">`;
            document.getElementById('shopResult').innerHTML = `
                <h2>🎴 КУПЛЕНО!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">Аршавин</div>
                <div style="font-size: 20px;">⭐⭐⭐</div>
                <div>Рейтинг: 82</div>
                <div>💰 Осталось монет: ${newCoins}</div>
            `;
            tg.showAlert(`🎴 Ты купил Аршавина за ${price} монет!`);
            updateBalanceDisplay();
        }
        
        function showCollection() {
            let data = getData();
            let collection = data.collection;
            if (collection.length === 0) {
                document.getElementById('collectionGrid').innerHTML = '<p>📭 Нет карточек. Открой пак!</p>';
                return;
            }
            let html = '';
            collection.forEach(card => {
                let imgHtml = card.img ? `<img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">` : '';
                html += `
                    <div class="collection-card">
                        ${imgHtml}
                        <div class="name">${card.name}</div>
                        <div style="font-size: 10px;">${'⭐'.repeat(card.stars)} (${card.rating})</div>
                    </div>
                `;
            });
            document.getElementById('collectionGrid').innerHTML = html;
        }
        
        function updateTimer() {
            let data = getData();
            let now = Date.now();
            let twoHours = 2 * 60 * 60 * 1000;
            let timer = document.getElementById('timer');
            if (data.lastOpen && now - data.lastOpen < twoHours) {
                let left = twoHours - (now - data.lastOpen);
                let hours = Math.floor(left / 3600000);
                let minutes = Math.floor((left % 3600000) / 60000);
                timer.textContent = `⏱️ Следующий бесплатный пак через ${hours}ч ${minutes}мин`;
            } else {
                timer.textContent = '✅ Бесплатный пак доступен!';
            }
        }
        
        function showSection(s) {
            document.getElementById('packSection').classList.add('hidden');
            document.getElementById('collectionSection').classList.add('hidden');
            document.getElementById('shopSection').classList.add('hidden');
            document.getElementById(s + 'Section').classList.remove('hidden');
            if (s === 'collection') showCollection();
            if (s === 'pack') updateTimer();
            document.querySelectorAll('.menu-btn').forEach((btn, i) => {
                let sections = ['pack', 'collection', 'shop'];
                btn.classList.toggle('active', sections[i] === s);
            });
            updateBalanceDisplay();
        }
        
        resetAdCounterIfNewDay();
        updateTimer();
        updateAdLimitDisplay();
        updateCoinAdLimitDisplay();
        updateBalanceDisplay();
        setInterval(updateTimer, 60000);
        showSection('pack');
    </script>
</body>
      </html>
