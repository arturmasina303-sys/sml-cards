<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SML Карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a, #0a1a3a);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            color: white;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .card {
            background: #1a2a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .menu-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .menu-btn {
            flex: 1;
            background: #2a3a5a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-btn.active { background: #e94560; }
        .pack-btn {
            background: linear-gradient(135deg, #e94560, #b52b43);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .result-area {
            background: #0f1422;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .card-img {
            width: 200px;
            max-width: 100%;
            border-radius: 15px;
            margin: 10px auto;
            display: block;
        }
        .timer { font-size: 14px; color: #aaa; margin-top: 15px; text-align: center; }
        .collection-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .collection-card {
            width: 100px;
            background: #0f1422;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
        }
        .collection-card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showSection('pack')">📦 Пак</button>
            <button class="menu-btn" onclick="showSection('collection')">📋 Коллекция</button>
        </div>

        <div id="packSection" class="card">
            <button class="pack-btn" onclick="openFreePack()">📦 ОТКРЫТЬ БЕСПЛАТНЫЙ ПАК</button>
            <div class="timer" id="timer">✅ Пак доступен</div>
            <div id="packResult" class="result-area"><p>Нажми кнопку</p></div>
        </div>

        <div id="collectionSection" class="card hidden">
            <h3>🎴 Моя коллекция</h3>
            <div id="collectionGrid" class="collection-grid"><p>Загрузка...</p></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        const allCards = [
            { name: "Messi", img: "messi.jpg", stars: 6, rating: 96 },
            { name: "Ronaldo", img: "ronaldo.jpg", stars: 5, rating: 92 },
            { name: "Haaland", img: "haaland.jpg", stars: 5, rating: 92 },
            { name: "Mbappe", img: "mbappe.jpg", stars: 5, rating: 92 }
        ];
        
        const rarityChance = [
            { stars: 1, chance: 48 },
            { stars: 2, chance: 31 },
            { stars: 3, chance: 12 },
            { stars: 4, chance: 5 },
            { stars: 5, chance: 3 },
            { stars: 6, chance: 1 }
        ];
        
        function getRandomCard() {
            let r = Math.floor(Math.random() * 100) + 1;
            let selectedStars = 1;
            let sum = 0;
            for (let i = 0; i < rarityChance.length; i++) {
                sum += rarityChance[i].chance;
                if (r <= sum) {
                    selectedStars = rarityChance[i].stars;
                    break;
                }
            }
            let cardsWithStars = allCards.filter(c => c.stars === selectedStars);
            if (cardsWithStars.length === 0) return allCards[0];
            return cardsWithStars[Math.floor(Math.random() * cardsWithStars.length)];
        }
        
        function getData() {
            return {
                collection: JSON.parse(localStorage.getItem('collection') || '[]'),
                lastOpen: parseInt(localStorage.getItem('lastOpen') || '0')
            };
        }
        
        function saveData(collection, lastOpen) {
            localStorage.setItem('collection', JSON.stringify(collection));
            if (lastOpen !== undefined) localStorage.setItem('lastOpen', lastOpen);
        }
        
        function openFreePack() {
            let data = getData();
            let now = Date.now();
            if (data.lastOpen && now - data.lastOpen < 3600000) {
                let left = 3600000 - (now - data.lastOpen);
                tg.showAlert(`⏳ Подожди ${Math.floor(left/60000)}:${Math.floor((left%60000)/1000).toString().padStart(2,'0')}`);
                return;
            }
            
            let card = getRandomCard();
            data.collection.push({ name: card.name, img: card.img, stars: card.stars, rating: card.rating });
            saveData(data.collection, now);
            
            let imgHtml = `<img class="card-img" src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">`;
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 ВЫПАЛО!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 ${card.name} (${'⭐'.repeat(card.stars)})`);
            updateTimer();
        }
        
        function showCollection() {
            let data = getData();
            let collection = data.collection;
            if (collection.length === 0) {
                document.getElementById('collectionGrid').innerHTML = '<p>📭 Нет карточек. Открой пак!</p>';
                return;
            }
            let html = '';
            collection.forEach(card => {
                html += `
                    <div class="collection-card">
                        <img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">
                        <div class="name">${card.name}</div>
                        <div style="font-size: 10px;">${'⭐'.repeat(card.stars)}</div>
                    </div>
                `;
            });
            document.getElementById('collectionGrid').innerHTML = html;
        }
        
        function updateTimer() {
            let data = getData();
            let now = Date.now();
            let timer = document.getElementById('timer');
            if (data.lastOpen && now - data.lastOpen < 3600000) {
                let left = 3600000 - (now - data.lastOpen);
                timer.textContent = `⏱️ Через ${Math.floor(left/60000)}:${Math.floor((left%60000)/1000).toString().padStart(2,'0')}`;
            } else timer.textContent = '✅ Пак доступен';
        }
        
        function showSection(s) {
            document.getElementById('packSection').classList.add('hidden');
            document.getElementById('collectionSection').classList.add('hidden');
            document.getElementById(s + 'Section').classList.remove('hidden');
            if (s === 'collection') showCollection();
            if (s === 'pack') updateTimer();
            document.querySelectorAll('.menu-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (s === 'pack' && i === 0) || (s === 'collection' && i === 1));
            });
        }
        
        updateTimer();
        setInterval(updateTimer, 1000);
        showSection('pack');
    </script>
</body>
  </html>
