<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SML Карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Monetag SDK -->
    <script src='https://static.monetag.io/sdk.js' data-zone='10759776' data-sdk='show_10759776'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a, #0a1a3a);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .card {
            background: #1a2a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .menu-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .menu-btn {
            flex: 1;
            background: #2a3a5a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-btn.active { background: #e94560; }
        .pack-btn {
            background: linear-gradient(135deg, #e94560, #b52b43);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .ad-pack-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        .result-area {
            background: #0f1422;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .card-img {
            width: 200px;
            max-width: 100%;
            border-radius: 15px;
            margin: 10px auto;
            display: block;
        }
        .timer { font-size: 14px; color: #aaa; margin-top: 15px; text-align: center; }
        .collection-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }
        .collection-card {
            width: 100px;
            background: #0f1422;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
        }
        .collection-card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }
        .collection-card .name {
            font-size: 11px;
            margin-top: 5px;
            color: #ffd966;
        }
        .ad-limit {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
        }
        .hidden { display: none; }
        .event-stage {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
        .opponent-card {
            display: inline-block;
            width: 80px;
            text-align: center;
            margin: 5px;
        }
        .opponent-card img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
        }
        .barca-pack {
            background: linear-gradient(135deg, #a50034, #004d98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showSection('pack')">📦 Пак</button>
            <button class="menu-btn" onclick="showSection('collection')">📋 Коллекция</button>
            <button class="menu-btn" onclick="showSection('event')">🏆 Событие</button>
        </div>

        <div id="packSection" class="card">
            <button class="pack-btn" onclick="openFreePack()">📦 БЕСПЛАТНЫЙ ПАК (раз/2ч)</button>
            <div class="timer" id="timer">✅ Пак доступен</div>
            <button class="pack-btn ad-pack-btn" onclick="openAdPack()">🎥 РЕКЛАМНЫЙ ПАК (7/день)</button>
            <div class="ad-limit" id="adLimitDisplay">🎥 Осталось рекламных паков: 7</div>
            <div id="packResult" class="result-area"><p>Нажми кнопку</p></div>
        </div>

        <div id="collectionSection" class="card hidden">
            <h3>🎴 Моя коллекция</h3>
            <div id="collectionGrid" class="collection-grid"><p>Загрузка...</p></div>
        </div>

        <div id="eventSection" class="card hidden">
            <h3>🏆 ПУТЬ К СЛАВЕ БАРСЕЛОНЫ 🏆</h3>
            <div id="eventStatus" class="event-stage">
                <p>Выбери свой состав (3 игрока) и начни прохождение!</p>
            </div>
            <div id="eventTeamSelect" class="collection-grid" style="max-height: 300px;"></div>
            <div id="selectedTeamDisplay" class="event-stage" style="margin-top: 10px;">
                <p>👥 Выбрано: <span id="selectedCount">0</span>/3</p>
                <div id="selectedPlayersList" style="font-size: 12px;"></div>
            </div>
            <button class="pack-btn" onclick="startEvent()">⚔️ НАЧАТЬ СОБЫТИЕ</button>
            <div id="eventResult" class="result-area"><p>Выбери 3 игроков и нажми "Начать событие"</p></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        const ZONE_ID = "10759776";
        
        // БАЗА ИГРОКОВ
        const allCards = [
            { name: "Messi", img: "messi.jpg", stars: 6, rating: 96, club: "Barcelona" },
            { name: "Ronaldo", img: "ronaldo.jpg", stars: 5, rating: 92, club: "Man United" },
            { name: "Haaland", img: "haaland.jpg", stars: 5, rating: 92, club: "Dortmund" },
            { name: "Mbappe", img: "mbappe.jpg", stars: 5, rating: 92, club: "PSG" },
            { name: "De Bruyne", img: "debruyne.jpg", stars: 4, rating: 88, club: "Man City" },
            { name: "Van Dijk", img: "vandijk.jpg", stars: 4, rating: 88, club: "Liverpool" },
            { name: "Salah", img: "salah.jpg", stars: 3, rating: 84, club: "Liverpool" },
            { name: "Vinicius Jr", img: "vinicius.jpg", stars: 3, rating: 84, club: "Real Madrid" },
            { name: "Rodri", img: "rodri.jpg", stars: 3, rating: 84, club: "Man City" },
            { name: "Pedri", img: "pedri.jpg", stars: 2, rating: 90, club: "Barcelona" },
            { name: "Foden", img: "foden.jpg", stars: 2, rating: 78, club: "Man City" },
            { name: "Gavi", img: "gavi.jpg", stars: 1, rating: 70, club: "Barcelona" },
            { name: "Fati", img: "fati.jpg", stars: 1, rating: 70, club: "Barcelona" },
            { name: "Torres", img: "torres.jpg", stars: 1, rating: 70, club: "Barcelona" },
            { name: "Garcia", img: "garcia.jpg", stars: 2, rating: 75, club: "Barcelona" },
            { name: "Lewandowski", img: "lewy.jpg", stars: 4, rating: 84, club: "Barcelona" },
            { name: "Raphinha", img: "raphinha.jpg", stars: 4, rating: 90, club: "Barcelona" },
            { name: "Yamal", img: "yamal.jpg", stars: 4, rating: 88, club: "Barcelona" }
        ];
        
        // СОБЫТИЕ: ЭТАПЫ БАРСЕЛОНЫ
        const eventStages = [
            {
                name: "Этап 1: Молодые звёзды",
                opponents: [
                    { name: "Fati", rating: 70, img: "fati.jpg" },
                    { name: "Gavi", rating: 70, img: "gavi.jpg" },
                    { name: "Torres", rating: 70, img: "torres.jpg" }
                ],
                totalPower: 210
            },
            {
                name: "Этап 2: Опытные лидеры",
                opponents: [
                    { name: "Pedri", rating: 90, img: "pedri.jpg" },
                    { name: "Garcia", rating: 75, img: "garcia.jpg" },
                    { name: "Lewandowski", rating: 84, img: "lewy.jpg" }
                ],
                totalPower: 249
            },
            {
                name: "Этап 3: Звёздный состав",
                opponents: [
                    { name: "Raphinha", rating: 90, img: "raphinha.jpg" },
                    { name: "Pedri", rating: 90, img: "pedri.jpg" },
                    { name: "Yamal", rating: 88, img: "yamal.jpg" }
                ],
                totalPower: 268
            }
        ];
        
        // Барселонский пак (награда)
        const barcaPackCards = allCards.filter(c => c.club === "Barcelona");
        
        const rarityChance = [
            { stars: 1, chance: 48 },
            { stars: 2, chance: 31 },
            { stars: 3, chance: 12 },
            { stars: 4, chance: 5 },
            { stars: 5, chance: 3 },
            { stars: 6, chance: 1 }
        ];
        
        let selectedPlayers = [];
        let eventProgress = {
            currentStage: 0,
            completed: false
        };
        
        function loadEventProgress() {
            let saved = localStorage.getItem('eventProgress');
            if (saved) {
                eventProgress = JSON.parse(saved);
            } else {
                eventProgress = { currentStage: 0, completed: false };
            }
        }
        
        function saveEventProgress() {
            localStorage.setItem('eventProgress', JSON.stringify(eventProgress));
        }
        
        function getRandomCard() {
            let r = Math.floor(Math.random() * 100) + 1;
            let selectedStars = 1;
            let sum = 0;
            for (let i = 0; i < rarityChance.length; i++) {
                sum += rarityChance[i].chance;
                if (r <= sum) {
                    selectedStars = rarityChance[i].stars;
                    break;
                }
            }
            let cardsWithStars = allCards.filter(c => c.stars === selectedStars);
            if (cardsWithStars.length === 0) return allCards[0];
            return cardsWithStars[Math.floor(Math.random() * cardsWithStars.length)];
        }
        
        function getData() {
            return {
                collection: JSON.parse(localStorage.getItem('collection') || '[]'),
                lastOpen: parseInt(localStorage.getItem('lastOpen') || '0'),
                adPacksToday: parseInt(localStorage.getItem('adPacksToday') || '0'),
                lastAdDate: localStorage.getItem('lastAdDate') || ''
            };
        }
        
        function saveData(collection, lastOpen, adPacksToday, lastAdDate) {
            localStorage.setItem('collection', JSON.stringify(collection));
            if (lastOpen !== undefined) localStorage.setItem('lastOpen', lastOpen);
            if (adPacksToday !== undefined) localStorage.setItem('adPacksToday', adPacksToday);
            if (lastAdDate !== undefined) localStorage.setItem('lastAdDate', lastAdDate);
        }
        
        function resetAdCounterIfNewDay() {
            let data = getData();
            let today = new Date().toDateString();
            if (data.lastAdDate !== today) {
                saveData(data.collection, data.lastOpen, 0, today);
                updateAdLimitDisplay();
            }
        }
        
        function updateAdLimitDisplay() {
            let data = getData();
            let remaining = 7 - (data.adPacksToday || 0);
            document.getElementById('adLimitDisplay').innerHTML = `🎥 Осталось рекламных паков: ${remaining}`;
        }
        
        function openAdPack() {
            resetAdCounterIfNewDay();
            let data = getData();
            
            if (data.adPacksToday >= 7) {
                tg.showAlert('❌ Лимит на сегодня (7 паков) исчерпан! Завтра будут новые.');
                return;
            }
            
            if (typeof monetag !== 'undefined') {
                monetag('showRewardedAd', ZONE_ID, function(success) {
                    if (success) {
                        giveAdPackReward();
                    } else {
                        tg.showAlert('❌ Реклама не была просмотрена до конца.');
                    }
                });
            } else {
                tg.showAlert('🎥 Тестовый режим: реклама пропущена.');
                giveAdPackReward();
            }
        }
        
        function giveAdPackReward() {
            let data = getData();
            let card = getRandomCard();
            data.collection.push(card);
            data.adPacksToday++;
            saveData(data.collection, data.lastOpen, data.adPacksToday, data.lastAdDate);
            updateAdLimitDisplay();
            
            let imgHtml = `<img class="card-img" src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">`;
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 РЕКЛАМНЫЙ ПАК!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 Рекламный пак: ${card.name} (${'⭐'.repeat(card.stars)})`);
        }
        
        function openFreePack() {
            let data = getData();
            let now = Date.now();
            let twoHours = 2 * 60 * 60 * 1000;
            
            if (data.lastOpen && now - data.lastOpen < twoHours) {
                let left = twoHours - (now - data.lastOpen);
                let hours = Math.floor(left / 3600000);
                let minutes = Math.floor((left % 3600000) / 60000);
                tg.showAlert(`⏳ Подожди ${hours}ч ${minutes}мин до следующего бесплатного пака`);
                return;
            }
            
            let card = getRandomCard();
            data.collection.push(card);
            saveData(data.collection, now, data.adPacksToday, data.lastAdDate);
            
            let imgHtml = `<img class="card-img" src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">`;
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 ВЫПАЛО!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 ${card.name} (${'⭐'.repeat(card.stars)})`);
            updateTimer();
        }
        
        function showCollection() {
            let data = getData();
            let collection = data.collection;
            if (collection.length === 0) {
                document.getElementById('collectionGrid').innerHTML = '<p>📭 Нет карточек. Открой пак!</p>';
                return;
            }
            let html = '';
            collection.forEach(card => {
                html += `
                    <div class="collection-card">
                        <img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">
                        <div class="name">${card.name}</div>
                        <div style="font-size: 10px;">${'⭐'.repeat(card.stars)}</div>
                    </div>
                `;
            });
            document.getElementById('collectionGrid').innerHTML = html;
        }
        
        function updateTimer() {
            let data = getData();
            let now = Date.now();
            let twoHours = 2 * 60 * 60 * 1000;
            let timer = document.getElementById('timer');
            if (data.lastOpen && now - data.lastOpen < twoHours) {
                let left = twoHours - (now - data.lastOpen);
                let hours = Math.floor(left / 3600000);
                let minutes = Math.floor((left % 3600000) / 60000);
                timer.textContent = `⏱️ Следующий бесплатный пак через ${hours}ч ${minutes}мин`;
            } else {
                timer.textContent = '✅ Бесплатный пак доступен!';
            }
        }
        
        // ========== СОБЫТИЕ ==========
        function loadEventTeamSelect() {
            let data = getData();
            let collection = data.collection;
            if (collection.length === 0) {
                document.getElementById('eventTeamSelect').innerHTML = '<p>📭 Нет карточек. Открой паки!</p>';
                return;
            }
            let html = '';
            collection.forEach(card => {
                let isSelected = selectedPlayers.some(p => p.name === card.name);
                html += `
                    <div class="collection-card ${isSelected ? 'selected' : ''}" style="cursor:pointer;" onclick="toggleEventPlayer('${card.name}', ${card.rating}, '${card.img}', ${card.stars})">
                        <img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">
                        <div class="name">${card.name}</div>
                        <div style="font-size: 10px;">${'⭐'.repeat(card.stars)} (${card.rating})</div>
                        ${isSelected ? '<div class="selected-mark">✓</div>' : ''}
                    </div>
                `;
            });
            document.getElementById('eventTeamSelect').innerHTML = html;
            updateEventSelectedDisplay();
        }
        
        function toggleEventPlayer(name, rating, img, stars) {
            let existing = selectedPlayers.find(p => p.name === name);
            if (existing) {
                selectedPlayers = selectedPlayers.filter(p => p.name !== name);
            } else {
                if (selectedPlayers.length >= 3) {
                    tg.showAlert('Можно выбрать только 3 игроков!');
                    return;
                }
                selectedPlayers.push({ name, rating, img, stars });
            }
            loadEventTeamSelect();
        }
        
        function updateEventSelectedDisplay() {
            document.getElementById('selectedCount').innerText = selectedPlayers.length;
            if (selectedPlayers.length === 0) {
                document.getElementById('selectedPlayersList').innerHTML = '';
                return;
            }
            let html = '<div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">';
            selectedPlayers.forEach(p => {
                html += `<div style="background: #1a2a4a; padding: 5px 10px; border-radius: 20px;">${p.name} (${p.rating})</div>`;
            });
            html += '</div>';
            document.getElementById('selectedPlayersList').innerHTML = html;
        }
        
        function startEvent() {
            if (selectedPlayers.length !== 3) {
                tg.showAlert('Выбери 3 игроков для участия в событии!');
                return;
            }
            
            loadEventProgress();
            
            if (eventProgress.completed) {
                tg.showAlert('🏆 Вы уже прошли это событие! Следите за новыми.');
                return;
            }
            
            let myPower = selectedPlayers.reduce((sum, p) => sum + p.rating, 0);
            let stage = eventStages[eventProgress.currentStage];
            
            let result = '';
            let resultClass = '';
            let myScore, oppScore;
            
            if (myPower > stage.totalPower) {
                myScore = Math.floor(Math.random() * 3) + 2;
                oppScore = Math.floor(Math.random() * 2);
                result = 'win';
                resultClass = 'win';
            } else if (myPower < stage.totalPower) {
                myScore = Math.floor(Math.random() * 2);
