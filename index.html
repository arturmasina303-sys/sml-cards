<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SML Карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a, #0a1a3a);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .card {
            background: #1a2a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .menu-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .menu-btn {
            flex: 1;
            background: #2a3a5a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-btn.active { background: #e94560; }
        .pack-btn {
            background: linear-gradient(135deg, #e94560, #b52b43);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .shop-item, .team-slot {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .shop-price {
            background: #ffd966;
            color: #1a2a4a;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .shop-btn, .select-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        .result-area {
            background: #0f1422;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .player-name { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .stars { font-size: 32px; margin: 10px 0; }
        .card-img {
            width: 200px;
            max-width: 100%;
            border-radius: 15px;
            margin: 10px auto;
            display: block;
        }
        .collection-img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }
        .timer { font-size: 14px; color: #aaa; margin-top: 15px; text-align: center; }
        .collection-list {
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .collection-item {
            text-align: center;
            width: 90px;
            background: #0f1422;
            padding: 8px;
            border-radius: 12px;
        }
        .team-summary {
            background: #0f1422;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
        }
        .hidden { display: none; }
        select {
            background: #2a3a5a;
            color: white;
            padding: 8px;
            border-radius: 10px;
            border: none;
            margin-left: 10px;
            width: 180px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showSection('pack')">📦 Пак</button>
            <button class="menu-btn" onclick="showSection('collection')">📋 Коллекция</button>
            <button class="menu-btn" onclick="showSection('shop')">🛒 Магазин</button>
            <button class="menu-btn" onclick="showSection('pvp')">⚔️ Матч</button>
        </div>

        <div id="packSection" class="card">
            <button class="pack-btn" onclick="openFreePack()">📦 ОТКРЫТЬ БЕСПЛАТНЫЙ ПАК</button>
            <div class="timer" id="timer">✅ Пак доступен</div>
            <div id="packResult" class="result-area"><p>Нажми кнопку</p></div>
        </div>

        <div id="collectionSection" class="card hidden">
            <h3>🎴 Коллекция</h3>
            <div id="collectionList" class="collection-list"><p>Загрузка...</p></div>
        </div>

        <div id="shopSection" class="card hidden">
            <h3>🛒 Магазин паков</h3>
            <div class="shop-item">
                <div><b>⭐ Пак 1⭐</b><br><small>Гарант 1⭐</small></div>
                <div class="shop-price">5 ⭐</div>
                <button class="shop-btn" onclick="buyPack(1, 5)">Купить</button>
            </div>
            <div class="shop-item">
                <div><b>⭐⭐ Пак 2⭐</b><br><small>Гарант 2⭐</small></div>
                <div class="shop-price">15 ⭐</div>
                <button class="shop-btn" onclick="buyPack(2, 15)">Купить</button>
            </div>
            <div class="shop-item">
                <div><b>⭐⭐⭐ Пак 3⭐</b><br><small>Гарант 3⭐</small></div>
                <div class="shop-price">30 ⭐</div>
                <button class="shop-btn" onclick="buyPack(3, 30)">Купить</button>
            </div>
            <div id="shopResult" class="result-area"><p>Выбери пак</p></div>
        </div>

        <div id="pvpSection" class="card hidden">
            <h3>⚔️ СОСТАВ НА МАТЧ</h3>
            <div class="team-slot"><span>⚽ Нападающий:</span><select id="forwardSelect" onchange="updateTeamPower()"><option value="">-- выбрать --</option></select></div>
            <div class="team-slot"><span>🎯 Полузащитник:</span><select id="midfielderSelect" onchange="updateTeamPower()"><option value="">-- выбрать --</option></select></div>
            <div class="team-slot"><span>🛡️ Защитник:</span><select id="defenderSelect" onchange="updateTeamPower()"><option value="">-- выбрать --</option></select></div>
            <div class="team-slot"><span>🧤 Вратарь:</span><select id="goalkeeperSelect" onchange="updateTeamPower()"><option value="">-- выбрать --</option></select></div>
            <div class="team-summary" id="teamPower">💪 Суммарная сила: 0</div>
            <button class="pack-btn" onclick="findMatch()">🔍 ИСКАТЬ СОПЕРНИКА</button>
            <div id="matchResult" class="result-area"><p>Выбери состав и нажми "Искать соперника"</p></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        const playerPower = {1:70, 2:78, 3:84, 4:88, 5:92, 6:96};
        
        // ИГРОКИ С ФОТО
        const playersData = {
            1: [
                { name: "Fati", stars: 1, img: "fati.jpg" },
                { name: "Pedri", stars: 1, img: "pedri.jpg" },
                { name: "Gavi", stars: 1, img: "gavi.jpg" },
                { name: "Camavinga", stars: 1, img: "camavinga.jpg" },
                { name: "Moukoko", stars: 1, img: "moukoko.jpg" },
                { name: "Bellingham", stars: 1, img: "bellingham.jpg" }
            ],
            2: [
                { name: "Odegaard", stars: 2, img: "odegaard.jpg" },
                { name: "Saka", stars: 2, img: "saka.jpg" },
                { name: "Foden", stars: 2, img: "foden.jpg" },
                { name: "Musiala", stars: 2, img: "musiala.jpg" },
                { name: "Wirtz", stars: 2, img: "wirtz.jpg" },
                { name: "Kvaratskhelia", stars: 2, img: "kvara.jpg" }
            ],
            3: [
                { name: "Rodri", stars: 3, img: "rodri.jpg" },
                { name: "Kimmich", stars: 3, img: "kimmich.jpg" },
                { name: "Bernardo Silva", stars: 3, img: "bernardo.jpg" },
                { name: "Vinicius Jr", stars: 3, img: "vinicius.jpg" },
                { name: "Salah", stars: 3, img: "salah.jpg" },
                { name: "Kane", stars: 3, img: "kane.jpg" }
            ],
            4: [
                { name: "Van Dijk", stars: 4, img: "vandijk.jpg" },
                { name: "Courtois", stars: 4, img: "courtois.jpg" },
                { name: "De Bruyne", stars: 4, img: "debruyne.jpg" },
                { name: "Benzema", stars: 4, img: "benzema.jpg" },
                { name: "Modric", stars: 4, img: "modric.jpg" },
                { name: "Neymar", stars: 4, img: "neymar.jpg" }
            ],
            5: [
                { name: "Haaland", stars: 5, img: "haaland.jpg" },
                { name: "Mbappe", stars: 5, img: "mbappe.jpg" },
                { name: "Ronaldo", stars: 5, img: "ronaldo.jpg" },
                { name: "Lewandowski", stars: 5, img: "lewy.jpg" }
            ],
            6: [
                { name: "Messi", stars: 6, img: "messi.jpg" },
                { name: "Ronaldinho", stars: 6, img: "ronaldinho.jpg" },
                { name: "Zidane", stars: 6, img: "zidane.jpg" },
                { name: "Cruyff", stars: 6, img: "cruyff.jpg" },
                { name: "Maradona", stars: 6, img: "maradona.jpg" },
                { name: "Pele", stars: 6, img: "pele.jpg" }
            ]
        };
        
        const starsMap = {1:"⭐",2:"⭐⭐",3:"⭐⭐⭐",4:"⭐⭐⭐⭐",5:"⭐⭐⭐⭐⭐",6:"⭐⭐⭐⭐⭐⭐"};
        
        function getPlayerPower(name) {
            for (let s=1; s<=6; s++) {
                let player = playersData[s].find(p => p.name === name);
                if (player) return playerPower[player.stars];
            }
            return 0;
        }
        
        function getPlayerImg(name) {
            for (let s=1; s<=6; s++) {
                let player = playersData[s].find(p => p.name === name);
                if (player) return player.img;
            }
            return null;
        }
        
        function getData() {
            return {
                collection: JSON.parse(localStorage.getItem('collection') || '[]'),
                lastOpen: parseInt(localStorage.getItem('lastOpen') || '0')
            };
        }
        
        function saveData(collection, lastOpen) {
            localStorage.setItem('collection', JSON.stringify(collection));
            if (lastOpen !== undefined) localStorage.setItem('lastOpen', lastOpen);
        }
        
        function getRarity() {
            let r = Math.floor(Math.random() * 100) + 1;
            if (r <= 48) return 1;
            if (r <= 79) return 2;
            if (r <= 91) return 3;
            if (r <= 96) return 4;
            if (r <= 99) return 5;
            return 6;
        }
        
        function getRandomPlayerByStars(stars) {
            let list = playersData[stars];
            return list[Math.floor(Math.random() * list.length)];
        }
        
        function showResult(player, stars, target) {
            let img = player.img;
            let imgHtml = img ? `<img class="card-img" src="${img}" alt="${player.name}" onerror="this.style.display='none'">` : '';
            let html = `<h2>🎴 ВЫПАЛО!</h2>${imgHtml}<div class="player-name">${player.name}</div><div class="stars">${starsMap[stars]}</div><div>Рейтинг: ${playerPower[stars]}</div>`;
            document.getElementById(target === 'pack' ? 'packResult' : 'shopResult').innerHTML = html;
        }
        
        function openFreePack() {
            let data = getData();
            let now = Date.now();
            if (data.lastOpen && now - data.lastOpen < 3600000) {
                let left = 3600000 - (now - data.lastOpen);
                tg.showAlert(`⏳ Подожди ${Math.floor(left/60000)}:${Math.floor((left%60000)/1000).toString().padStart(2,'0')}`);
                return;
            }
            let stars = getRarity();
            let player = getRandomPlayerByStars(stars);
            data.collection.push({ name: player.name, stars: player.stars, img: player.img });
            saveData(data.collection, now);
            showResult(player, stars, 'pack');
            tg.showAlert(`🎴 ${player.name} (${starsMap[stars]}, рейтинг ${playerPower[stars]})`);
            updateTimer();
            updateTeamSelectors();
        }
        
        async function buyPack(guaranteedStars, price) {
            try {
                tg.openInvoice({
                    title: `Пак ${guaranteedStars}⭐`,
                    description: `Гарантированный игрок ${guaranteedStars}⭐`,
                    payload: JSON.stringify({ stars: guaranteedStars }),
                    provider_token: '',
                    currency: 'XTR',
                    prices: [{ label: 'Пак', amount: price }]
                });
                tg.onEvent('invoiceClosed', (data) => {
                    if (data.status === 'paid') {
                        let player = getRandomPlayerByStars(guaranteedStars);
                        let coll = getData().collection;
                        coll.push({ name: player.name, stars: player.stars, img: player.img });
                        saveData(coll);
                        showResult(player, guaranteedStars, 'shop');
                        tg.showAlert(`🎴 Куплен пак ${guaranteedStars}⭐! ${player.name}`);
                        updateTeamSelectors();
                    } else tg.showAlert('❌ Отмена');
                });
            } catch(e) { tg.showAlert('Ошибка'); }
        }
        
        function showCollection() {
            let coll = getData().collection;
            if (!coll.length) { 
                document.getElementById('collectionList').innerHTML = '<p>📭 Нет карточек</p>'; 
                return; 
            }
            
            let html = '';
            coll.forEach(card => {
                let img = card.img || getPlayerImg(card.name);
                let imgHtml = img ? `<img class="collection-img" src="${img}" alt="${card.name}" onerror="this.style.display='none'">` : '';
                html += `
                    <div class="collection-item">
                        ${imgHtml}
                        <div style="font-size: 12px; margin-top: 5px;">${card.name}</div>
                        <div style="font-size: 12px;">${starsMap[card.stars]}</div>
                        <div style="font-size: 11px; color: #ffd966;">${playerPower[card.stars]}</div>
                    </div>
                `;
            });
            html += `<div style="width: 100%; text-align: center; margin-top: 10px;">Всего: ${coll.length} карточек</div>`;
            document.getElementById('collectionList').innerHTML = html;
        }
        
        function updateTeamSelectors() {
            let coll = getData().collection;
            ['forwardSelect','midfielderSelect','defenderSelect','goalkeeperSelect'].forEach(id => {
                let sel = document.getElementById(id);
                let cur = sel.value;
                sel.innerHTML = '<option value="">-- выбрать --</option>';
                coll.forEach(c => {
                    let opt = document.createElement('option');
                    opt.value = c.name;
                    opt.textContent = `${c.name} (${starsMap[c.stars]}, рейтинг ${playerPower[c.stars]})`;
                    sel.appendChild(opt);
                });
                if (cur && coll.some(c=>c.name===cur)) sel.value = cur;
                else sel.value = '';
            });
            updateTeamPower();
        }
        
        function updateTeamPower() {
            let forward = document.getElementById('forwardSelect').value;
            let midfielder = document.getElementById('midfielderSelect').value;
            let defender = document.getElementById('defenderSelect').value;
            let goalkeeper = document.getElementById('goalkeeperSelect').value;
            let power = (forward ? getPlayerPower(forward) : 0) +
                        (midfielder ? getPlayerPower(midfielder) : 0) +
                        (defender ? getPlayerPower(defender) : 0) +
                        (goalkeeper ? getPlayerPower(goalkeeper) : 0);
            document.getElementById('teamPower').innerHTML = `💪 Суммарная сила: ${power}`;
        }
        
        function findMatch() {
            let forward = document.getElementById('forwardSelect').value;
            let midfielder = document.getElementById('midfielderSelect').value;
            let defender = document.getElementById('defenderSelect').value;
            let goalkeeper = document.getElementById('goalkeeperSelect').value;
            
            if (!forward || !midfielder || !defender || !goalkeeper) {
                tg.showAlert('Выбери всех игроков!');
                return;
            }
            
            let myPower = getPlayerPower(forward) + getPlayerPower(midfielder) + 
                          getPlayerPower(defender) + getPlayerPower(goalkeeper);
            
            let coll = getData().collection;
            if (coll.length < 4) {
                tg.showAlert('Недостаточно карточек для матча');
                return;
            }
            
            let shuffled = [...coll];
            for (let i=shuffled.length-1;i>0;i--) {
                let j = Math.floor(Math.random()*(i+1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            let opp = shuffled.slice(0,4);
            let oppPower = opp.reduce((s,c) => s + getPlayerPower(c.name), 0);
            
            let wins = parseInt(localStorage.getItem('wins')||0);
            let losses = parseInt(localStorage.getItem('losses')||0);
            let result = '';
            
            if (myPower > oppPower) {
                result = '🏆 ПОБЕДА!';
                wins++;
                localStorage.setItem('wins', wins);
            } else if (myPower < oppPower) {
                result = '😔 ПОРАЖЕНИЕ';
                losses++;
                localStorage.setItem('losses', losses);
            } else {
                result = '🤝 НИЧЬЯ!';
            }
            
            document.getElementById('matchResult').innerHTML = `
                <h3>⚔️ РЕЗУЛЬТАТ</h3>
                <p><b>Твоя сила:</b> ${myPower}</p>
                <p><b>Сила соперника:</b> ${oppPower}</p>
                <p><b>Состав соперника:</b><br>
                ${opp.map(c => `${c.name} (${starsMap[c.stars]}, рейтинг ${playerPower[c.stars]})`).join('<br>')}</p>
                <h2>${result}</h2>
                <p>🏆 Побед: ${wins} | 😔 Поражений: ${losses}</p>
            `;
        }
        
        function updateTimer() {
            let last = getData().lastOpen;
            let now = Date.now();
            let timer = document.getElementById('timer');
            if (last && now - last < 3600000) {
                let left = 3600000 - (now - last);
                timer.textContent = `⏱️ Через ${Math.floor(left/60000)}:${Math.floor((left%60000)/1000).toString().padStart(2,'0')}`;
            } else timer.textContent = '✅ Пак доступен';
        }
        
        function showSection(s) {
            ['pack','collection','shop','pvp'].forEach(id => document.getElementById(id+'Section').classList.add('hidden'));
            document.getElementById(s+'Section').classList.remove('hidden');
            if (s === 'collection') showCollection();
            if (s === 'pack') updateTimer();
            if (s === 'pvp') updateTeamSelectors();
            document.querySelectorAll('.menu-btn').forEach((btn,i) => btn.classList.toggle('active', ['pack','collection','shop','pvp'][i] === s));
        }
        
        updateTimer();
        setInterval(updateTimer,
