<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SML Карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a, #0a1a3a);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .card {
            background: #1a2a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .menu-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .menu-btn {
            flex: 1;
            background: #2a3a5a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-btn.active { background: #e94560; }
        .pack-btn {
            background: linear-gradient(135deg, #e94560, #b52b43);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .shop-item, .team-slot {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-price {
            background: #ffd966;
            color: #1a2a4a;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .shop-btn, .select-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        .result-area {
            background: #0f1422;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .player-name { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .stars { font-size: 32px; margin: 10px 0; }
        .timer { font-size: 14px; color: #aaa; margin-top: 15px; text-align: center; }
        .collection-list { max-height: 400px; overflow-y: auto; text-align: left; }
        .team-summary {
            background: #0f1422;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
        }
        .hidden { display: none; }
        select {
            background: #2a3a5a;
            color: white;
            padding: 8px;
            border-radius: 10px;
            border: none;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showSection('pack')">📦 Пак</button>
            <button class="menu-btn" onclick="showSection('collection')">📋 Коллекция</button>
            <button class="menu-btn" onclick="showSection('shop')">🛒 Магазин</button>
            <button class="menu-btn" onclick="showSection('pvp')">⚔️ Матч</button>
        </div>

        <div id="packSection" class="card">
            <button class="pack-btn" onclick="openFreePack()">📦 ОТКРЫТЬ БЕСПЛАТНЫЙ ПАК</button>
            <div class="timer" id="timer">✅ Пак доступен</div>
            <div id="packResult" class="result-area"><p>Нажми кнопку</p></div>
        </div>

        <div id="collectionSection" class="card hidden">
            <h3>🎴 Коллекция</h3>
            <div id="collectionList" class="collection-list"><p>Загрузка...</p></div>
        </div>

        <div id="shopSection" class="card hidden">
            <h3>🛒 Магазин паков</h3>
            <div class="shop-item">
                <div><b>⭐ Пак 1⭐</b><br><small>Гарант 1⭐</small></div>
                <div class="shop-price">5 ⭐</div>
                <button class="shop-btn" onclick="buyPack(1, 5)">Купить</button>
            </div>
            <div class="shop-item">
                <div><b>⭐⭐ Пак 2⭐</b><br><small>Гарант 2⭐</small></div>
                <div class="shop-price">15 ⭐</div>
                <button class="shop-btn" onclick="buyPack(2, 15)">Купить</button>
            </div>
            <div class="shop-item">
                <div><b>⭐⭐⭐ Пак 3⭐</b><br><small>Гарант 3⭐</small></div>
                <div class="shop-price">30 ⭐</div>
                <button class="shop-btn" onclick="buyPack(3, 30)">Купить</button>
            </div>
            <div id="shopResult" class="result-area"><p>Выбери пак</p></div>
        </div>

        <div id="pvpSection" class="card hidden">
            <h3>⚔️ СОСТАВ НА МАТЧ</h3>
            <div class="team-slot"><span>⚽ Нападающий:</span><select id="forwardSelect"><option value="">-- выбрать --</option></select></div>
            <div class="team-slot"><span>🎯 Полузащитник:</span><select id="midfielderSelect"><option value="">-- выбрать --</option></select></div>
            <div class="team-slot"><span>🛡️ Защитник:</span><select id="defenderSelect"><option value="">-- выбрать --</option></select></div>
            <div class="team-slot"><span>🧤 Вратарь:</span><select id="goalkeeperSelect"><option value="">-- выбрать --</option></select></div>
            <div class="team-summary" id="teamPower">💪 Суммарная сила: 0</div>
            <button class="pack-btn" onclick="findMatch()">🔍 ИСКАТЬ СОПЕРНИКА</button>
            <div id="matchResult" class="result-area"><p>Выбери состав и нажми "Искать соперника"</p></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        const playerPower = {1:10, 2:20, 3:35, 4:50, 5:75, 6:100};
        const players = {
            1: ["Fati", "Pedri", "Gavi", "Camavinga", "Gravenberch", "Moukoko", "Bellingham"],
            2: ["Odegaard", "Saka", "Foden", "Musiala", "Wirtz", "Kvaratskhelia", "Leao"],
            3: ["Rodri", "Kimmich", "Bernardo Silva", "Vinicius Jr", "Salah", "Kane", "Osimhen"],
            4: ["Van Dijk", "Courtois", "De Bruyne", "Benzema", "Modric", "Neymar", "Alisson"],
            5: ["Haaland", "Mbappe", "Ronaldo", "Lewandowski"],
            6: ["Messi", "Ronaldinho", "Zidane", "Cruyff", "Maradona", "Pele"]
        };
        const starsMap = {1:"⭐",2:"⭐⭐",3:"⭐⭐⭐",4:"⭐⭐⭐⭐",5:"⭐⭐⭐⭐⭐",6:"⭐⭐⭐⭐⭐⭐"};
        
        function getPlayerPower(name) {
            for (let s=1; s<=6; s++) if (players[s].includes(name)) return playerPower[s];
            return 0;
        }
        
        function getData() {
            return {
                collection: JSON.parse(localStorage.getItem('collection') || '[]'),
                lastOpen: parseInt(localStorage.getItem('lastOpen') || '0')
            };
        }
        
        function saveData(collection, lastOpen) {
            localStorage.setItem('collection', JSON.stringify(collection));
            if (lastOpen !== undefined) localStorage.setItem('lastOpen', lastOpen);
        }
        
        function getRarity() {
            let r = Math.floor(Math.random() * 100) + 1;
            if (r <= 48) return 1;
            if (r <= 79) return 2;
            if (r <= 91) return 3;
            if (r <= 96) return 4;
            if (r <= 99) return 5;
            return 6;
        }
        
        function showResult(player, stars, target) {
            let html = `<h2>🎴 ВЫПАЛО!</h2><div class="player-name">${player}</div><div class="stars">${starsMap[stars]}</div>`;
            document.getElementById(target === 'pack' ? 'packResult' : 'shopResult').innerHTML = html;
        }
        
        function openFreePack() {
            let data = getData();
            let now = Date.now();
            if (data.lastOpen && now - data.lastOpen < 3600000) {
                let left = 3600000 - (now - data.lastOpen);
                tg.showAlert(`⏳ Подожди ${Math.floor(left/60000)}:${Math.floor((left%60000)/1000).toString().padStart(2,'0')}`);
                return;
            }
            let stars = getRarity();
            let player = players[stars][Math.floor(Math.random() * players[stars].length)];
            data.collection.push({ name: player, stars });
            saveData(data.collection, now);
            showResult(player, stars, 'pack');
            tg.showAlert(`🎴 ${player} (${starsMap[stars]})`);
            updateTimer();
            updateTeamSelectors();
        }
        
        async function buyPack(guaranteedStars, price) {
            try {
                tg.openInvoice({
                    title: `Пак ${guaranteedStars}⭐`,
                    description: `Гарантированный игрок ${guaranteedStars}⭐`,
                    payload: JSON.stringify({ stars: guaranteedStars }),
                    provider_token: '',
                    currency: 'XTR',
                    prices: [{ label: 'Пак', amount: price }]
                });
                tg.onEvent('invoiceClosed', (data) => {
                    if (data.status === 'paid') {
                        let player = players[guaranteedStars][Math.floor(Math.random() * players[guaranteedStars].length)];
                        let coll = getData().collection;
                        coll.push({ name: player, stars: guaranteedStars });
                        saveData(coll);
                        showResult(player, guaranteedStars, 'shop');
                        tg.showAlert(`🎴 Куплен пак ${guaranteedStars}⭐! ${player}`);
                        updateTeamSelectors();
                    } else tg.showAlert('❌ Отмена');
                });
            } catch(e) { tg.showAlert('Ошибка'); }
        }
        
        function showCollection() {
            let coll = getData().collection;
            if (!coll.length) { document.getElementById('collectionList').innerHTML = '<p>📭 Нет карточек</p>'; return; }
            let grouped = {1:[],2:[],3:[],4:[],5:[],6:[]};
            coll.forEach(c => grouped[c.stars].push(c.name));
            let html = '';
            for (let i=1;i<=6;i++) if (grouped[i].length) html += `<div style="margin-top:15px"><b>${starsMap[i]}</b> — ${grouped[i].length} шт.<div style="margin-left:15px;font-size:14px;color:#aaa">${grouped[i].join(', ')}</div></div>`;
            html += `<div style="margin-top:15px;font-weight:bold">Всего: ${coll.length}</div>`;
            document.getElementById('collectionList').innerHTML = html;
        }
        
        function updateTeamSelectors() {
            let coll = getData().collection;
            ['forwardSelect','midfielderSelect','defenderSelect','goalkeeperSelect'].forEach(id => {
                let sel = document.getElementById(id);
                let cur = sel.value;
                sel.innerHTML = '<option value="">-- выбрать --</option>';
                coll.forEach(c => {
                    let opt = document.createElement('option');
                    opt.value = c.name;
                    opt.textContent = `${c.name} (${starsMap[c.stars]})`;
                    sel.appendChild(opt);
                });
                if (cur && coll.some(c=>c.name===cur)) sel.value = cur;
            });
            updateTeamPower();
        }
        
        function updateTeamPower() {
            let p = ['forwardSelect','midfielderSelect','defenderSelect','goalkeeperSelect'].reduce((sum,id) => sum + getPlayerPower(document.getElementById(id).value), 0);
            document.getElementById('teamPower').innerHTML = `💪 Суммарная сила: ${p}`;
        }
        
        function findMatch() {
            let team = ['forwardSelect','midfielderSelect','defenderSelect','goalkeeperSelect'].map(id => document.getElementById(id).value);
            if (team.some(v => !v)) { tg.showAlert('Выбери всех игроков!'); return; }
            let myPower = team.reduce((s,n) => s + getPlayerPower(n), 0);
            let coll = getData().collection;
            if (coll.length < 4) { tg.showAlert('У соперника недостаточно карточек'); return; }
            let shuffled = [...coll];
            for (let i=shuffled.length-1;i>0;i--) { let j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
            let opp = shuffled.slice(0,4);
            let oppPower = opp.reduce((s,c) => s + getPlayerPower(c.name), 0);
            let wins = parseInt(localStorage.getItem('wins')||0);
            let losses = parseInt(localStorage.getItem('losses')||0);
            let result = '';
            if (myPower > oppPower) { result = '🏆 ПОБЕДА!'; wins++; localStorage.setItem('wins',wins); }
            else if (myPower < oppPower) { result = '😔 ПОРАЖЕНИЕ'; losses++; localStorage.setItem('losses',losses); }
            else result = '🤝 НИЧЬЯ!';
            document.getElementById('matchResult').innerHTML = `<h3>⚔️ РЕЗУЛЬТАТ</h3><p>Твоя сила: ${myPower}</p><p>Сила соперника: ${oppPower}</p><p>Состав соперника:<br>${opp.map(c=>`${c.name} (${starsMap[c.stars]})`).join(', ')}</p><h2>${result}</h2><p>🏆 Побед: ${wins} | 😔 Поражений: ${losses}</p>`;
        }
        
        function updateTimer() {
            let last = getData().lastOpen;
            let now = Date.now();
            let timer = document.getElementById('timer');
            if (last && now - last < 3600000) {
                let left = 3600000 - (now - last);
                timer.textContent = `⏱️ Через ${Math.floor(left/60000)}:${Math.floor((left%60000)/1000).toString().padStart(2,'0')}`;
            } else timer.textContent = '✅ Пак доступен';
        }
        
        function showSection(s) {
            ['pack','collection','shop','pvp'].forEach(id => document.getElementById(id+'Section').classList.add('hidden'));
            document.getElementById(s+'Section').classList.remove('hidden');
            if (s === 'collection') showCollection();
            if (s === 'pack') updateTimer();
            if (s === 'pvp') updateTeamSelectors();
            document.querySelectorAll('.menu-btn').forEach((btn,i) => btn.classList.toggle('active', ['pack','collection','shop','pvp'][i] === s));
        }
        
        updateTimer();
        setInterval(updateTimer, 1000);
        showSection('pack');
    </script>
</body>
              </html>
