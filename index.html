        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0a0f2a,#0a1a3a);font-family:'Segoe UI',Arial,sans-serif;padding:20px;color:#fff;min-height:100vh}
        .container{max-width:400px;margin:0 auto}
        .card{background:#1a2a4a;border-radius:20px;padding:20px;margin-bottom:20px}
        .menu-buttons{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .menu-btn{flex:1;background:#2a3a5a;border:none;color:#fff;padding:12px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
        .menu-btn.active{background:#e94560}
        .pack-btn{background:#e94560;width:100%;padding:15px;font-size:18px;border:none;color:#fff;border-radius:12px;cursor:pointer;font-weight:700;margin-bottom:15px}
        .ad-pack-btn{background:#2ecc71}
        .result-area{background:#0f1422;border-radius:15px;padding:20px;text-align:center;margin-top:15px;min-height:150px}
        .card-img{width:200px;max-width:100%;border-radius:15px;margin:10px auto;display:block}
        .timer{font-size:14px;color:#aaa;margin-top:15px;text-align:center}
        .collection-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-height:500px;overflow-y:auto;padding:10px}
        .collection-card{width:100px;background:#0f1422;border-radius:12px;padding:8px;text-align:center}
        .collection-card img{width:80px;height:80px;border-radius:10px;object-fit:cover}
        .collection-card .name{font-size:11px;margin-top:5px;color:#ffd966}
        .ad-limit{font-size:12px;color:#aaa;text-align:center;margin-top:5px}
        .balance{background:#0f1422;border-radius:15px;padding:12px;text-align:center;margin-bottom:15px;font-size:18px;font-weight:700}
        .shop-item{background:#0f1422;border-radius:15px;padding:15px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
        .shop-price{background:#ffd966;color:#1a2a4a;padding:8px 15px;border-radius:20px;font-weight:700}
        .shop-btn{background:#e94560;border:none;color:#fff;padding:8px 20px;border-radius:20px;cursor:pointer}
        .hidden{display:none}
        h3{margin-bottom:15px;text-align:center}
        .team-card{background:#0f1422;border-radius:15px;padding:15px;margin-bottom:15px}
        .team-name{font-size:20px;font-weight:bold;color:#ffd966;margin-bottom:10px}
        .player-list{font-size:14px;margin:5px 0}

        .fight-result{font-size:18px;font-weight:bold;margin:10px 0}
        .reward{color:#ffd966}
        input{width:100%;padding:10px;margin:10px 0;border-radius:10px;border:none}

<div class="container">

    <div id="packSection" class="card">

        <div id="matchArea" class="result-area">
            <p>🎲 Найди соперника...</p>
            <button class="pack-btn" style="margin-top:15px" onclick="startMatch()">НАЙТИ СОПЕРНИКА</button>

    </div>

    <div id="tournamentSection" class="card hidden">

    </div>
</div>

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function getRandomCard() {
    let r = Math.random() * 100;
    let star = 1;
    if(r < 10) star = 3;
    else if(r < 45) star = 2;
    let filtered = allCards.filter(c => c.stars === star);
    return filtered[Math.floor(Math.random() * filtered.length)];
}

function getData() {
    return {
        collection: JSON.parse(localStorage.getItem('collection') || '[]'),
        lastOpen: parseInt(localStorage.getItem('lastOpen') || '0'),
        adPacksToday: parseInt(localStorage.getItem('adPacksToday') || '0'),
        lastAdDate: localStorage.getItem('lastAdDate') || '',
        coins: parseInt(localStorage.getItem('coins') || '0'),
        coinAdsToday: parseInt(localStorage.getItem('coinAdsToday') || '0'),
        lastCoinAdDate: localStorage.getItem('lastCoinAdDate') || ''
    };
}

function saveData(c, lo, ap, la, co, cat, lca) {
    localStorage.setItem('collection', JSON.stringify(c));
    if(lo !== undefined) localStorage.setItem('lastOpen', lo);
    if(ap !== undefined) localStorage.setItem('adPacksToday', ap);
    if(la !== undefined) localStorage.setItem('lastAdDate', la);
    if(co !== undefined) localStorage.setItem('coins', co);
    if(cat !== undefined) localStorage.setItem('coinAdsToday', cat);
    if(lca !== undefined) localStorage.setItem('lastCoinAdDate', lca);
    updateBalance();
}

function resetDay() {
    let d = getData();
    let today = new Date().toDateString();
    if(d.lastAdDate !== today) {
        d.adPacksToday = 0;
        d.lastAdDate = today;
        saveData(d.collection, d.lastOpen, 0, today, d.coins, d.coinAdsToday, d.lastCoinAdDate);
    }
    if(d.lastCoinAdDate !== today) {
        d.coinAdsToday = 0;
        d.lastCoinAdDate = today;
        saveData(d.collection, d.lastOpen, d.adPacksToday, d.lastAdDate, d.coins, 0, today);
    }
    updateLimits();
}

function updateLimits() {
    let d = getData();
    let adRem = 2 - (d.adPacksToday || 0);
    let coinRem = 2 - (d.coinAdsToday || 0);
    let adEl = document.getElementById('adLimitDisplay');
    let coinEl = document.getElementById('coinAdLimitDisplay');
    if(adEl) adEl.innerHTML = `🎥 Осталось: ${adRem}`;
    if(coinEl) coinEl.innerHTML = `💰 Осталось: ${coinRem}`;
}

function updateBalance() {
    let d = getData();
    let b1 = document.getElementById('coinBalance');
    let b2 = document.getElementById('shopCoinBalance');
    if(b1) b1.innerText = d.coins;
    if(b2) b2.innerText = d.coins;
}

function showCard(title, card) {
    let img = card.img ? `<img class="card-img" src="${card.img}" onerror="this.style.display='none'">` : '';
    document.getElementById('packResult').innerHTML = `
        <h2>${title}</h2>
        ${img}
        <div style="font-size:24px">✨ ${card.name} ✨</div>
        <div>${'⭐'.repeat(card.stars)} (${card.rating})</div>
    `;
}

// ========== ПАКИ ==========
function openFreePack() {
    let d = getData();
    let now = Date.now();
    let twoHours = 7200000;
    if(d.lastOpen && now - d.lastOpen < twoHours) {
        let left = twoHours - (now - d.lastOpen);
        let hours = Math.floor(left / 3600000);
        let minutes = Math.floor((left % 3600000) / 60000);
        tg.showAlert(`⏳ Жди ${hours}ч ${minutes}мин`);
        return;
    }
    let card = getRandomCard();
    d.collection.push(card);
    saveData(d.collection, now, d.adPacksToday, d.lastAdDate, d.coins, d.coinAdsToday, d.lastCoinAdDate);
    showCard('🎴 ВЫПАЛО!', card);
    tg.showAlert(`🎴 ${card.name} (${'⭐'.repeat(card.stars)})`);
    updateTimer();
}

function openAdPack() {
    resetDay();
    let d = getData();
    if(d.adPacksToday >= 2) {
        tg.showAlert('❌ Лимит на сегодня (2 пака) исчерпан! Завтра будут новые.');
        return;
    }
    let card = getRandomCard();
    d.collection.push(card);
    d.adPacksToday++;
    saveData(d.collection, d.lastOpen, d.adPacksToday, d.lastAdDate, d.coins, d.coinAdsToday, d.lastCoinAdDate);
    updateLimits();
    showCard('🎥 РЕКЛАМНЫЙ ПАК!', card);
    tg.showAlert(`🎴 ${card.name} (${'⭐'.repeat(card.stars)})`);
    if(typeof monetag !== 'undefined' && monetag) {
        monetag('showRewardedAd', '10759776', function(success) {
            if(success) console.log('Реклама показана');
        });
    }
}

function watchAdForCoins() {
    resetDay();
    let d = getData();
    if(d.coinAdsToday >= 2) {
        tg.showAlert('❌ Лимит на сегодня (2 раза) исчерпан! Завтра будут новые.');
        return;
    }
    let newCoins = d.coins + 50;
    d.coinAdsToday++;
    saveData(d.collection, d.lastOpen, d.adPacksToday, d.lastAdDate, newCoins, d.coinAdsToday, d.lastCoinAdDate);
    updateLimits();
    updateBalance();
    document.getElementById('packResult').innerHTML = `<h2>💰 +50 МОНЕТ!</h2><p>Баланс: ${newCoins}</p>`;
    tg.showAlert(`💰 +50 монет! Баланс: ${newCoins}`);
    if(typeof monetag !== 'undefined' && monetag) {
        monetag('showRewardedAd', '10759776', function(success) {
            if(success) console.log('Реклама показана');
        });
    }
}

function buyArshavin() {
    let d = getData();
    let price = 1250;
    if(d.coins < price) {
        tg.showAlert(`❌ Нужно ${price} монет`);
        return;
    }
    if(d.collection.some(c => c.name === "Arshavin")) {
        tg.showAlert('❌ Уже есть');
        return;
    }
    let newCoins = d.coins - price;
    let arshavin = {name:"Arshavin",img:"arshavin.jpg",stars:3,rating:82};
    d.collection.push(arshavin);
    saveData(d.collection, d.lastOpen, d.adPacksToday, d.lastAdDate, newCoins, d.coinAdsToday, d.lastCoinAdDate);
    document.getElementById('shopResult').innerHTML = `<h2>✅ КУПЛЕНО!</h2><div>⚽ Аршавин</div><div>⭐⭐⭐ Рейтинг:82</div><div>💰 Осталось: ${newCoins}</div>`;
    tg.showAlert(`🎴 Куплен Аршавин!`);
    updateBalance();
}

    let d = getData();
    let coll = d.collection;
    if(coll.length === 0) {
        document.getElementById('collectionGrid').innerHTML = '<p>📭 Нет карточек</p>';
        return;
    }
    let unique = {};
    coll.forEach(c => {
        if(!unique[c.name]) unique[c.name] = {...c, count:1};
        else unique[c.name].count++;
    });
    let html = '';
    Object.values(unique).forEach(c => {
        let img = c.img ? `<img src="${c.img}" onerror="this.style.display='none'">` : '<div style="width:80px;height:80px;background:#2a3a5a;border-radius:10px;display:flex;align-items:center;justify-content:center">🎴</div>';
        html += `<div class="collection-card">${img}<div class="name">${c.name}</div><div>${'⭐'.repeat(c.stars)}(${c.rating})</div><div style="color:#ffd966;">✖️${c.count}</div></div>`;
    });
    document.getElementById('collectionGrid').innerHTML = html;
}

function updateTimer() {
    let d = getData();
    let now = Date.now();
    let twoHours = 7200000;
    let timer = document.getElementById('timer');
    if(d.lastOpen && now - d.lastOpen < twoHours) {
        let left = twoHours - (now - d.lastOpen);
        let hours = Math.floor(left / 3600000);
        let minutes = Math.floor((left % 3600000) / 60000);
        timer.textContent = `⏱️ Через ${hours}ч ${minutes}мин`;
    } else {
        timer.textContent = '✅ Пак доступен';
    }
}

function confirmFight() {
    if(selectedTeam.some(s => s === null)) {
        tg.showAlert('Выбери всех 3 футболистов!');
        return;
    }
    
    let myAvg = selectedTeam.reduce((sum,p) => sum + p.rating,0) / 3;
    let opponentAvg = currentOpponent.players.reduce((sum,p) => sum + p.rating,0) / 3;
    let diff = myAvg - opponentAvg;
    let baseChance = 50 + diff * 0.8;
    let luck = (Math.random() - 0.5) * 20;
    let finalChance = Math.min(95, Math.max(5, baseChance + luck));
    let isWin = Math.random() * 100 < finalChance;
    
    let myGoals = [];
    let opponentGoals = [];
    let totalGoals = isWin ? Math.floor(Math.random() * 3) + 1 : Math.floor(Math.random() * 2);
    let totalOpponentGoals = isWin ? Math.floor(Math.random() * 2) : Math.floor(Math.random() * 3) + 1;
    
    for(let i=0; i<totalGoals; i++) {
        let scorer = selectedTeam[Math.floor(Math.random() * 3)];
        let assistant = selectedTeam[Math.floor(Math.random() * 3)];
        while(assistant.name === scorer.name) assistant = selectedTeam[Math.floor(Math.random() * 3)];
        myGoals.push({scorer: scorer.name, assistant: assistant.name});
    }
    for(let i=0; i<totalOpponentGoals; i++) {
        let scorer = currentOpponent.players[Math.floor(Math.random() * 3)];
        let assistant = currentOpponent.players[Math.floor(Math.random() * 3)];
        while(assistant.name === scorer.name) assistant = currentOpponent.players[Math.floor(Math.random() * 3)];
        opponentGoals.push({scorer: scorer.name, assistant: assistant.name});
    }
    
    let d = getData();
    let reward = isWin ? 3 : 1;
    d.coins += reward;
    saveData(d.collection, d.lastOpen, d.adPacksToday, d.lastAdDate, d.coins, d.coinAdsToday, d.lastCoinAdDate);
    updateBalance();
    
    let myGoalsHtml = myGoals.map(g => `<div>⚽ ${g.scorer} (ассист: ${g.assistant})</div>`).join('');
    let opponentGoalsHtml = opponentGoals.map(g => `<div>⚽ ${g.scorer} (ассист: ${g.assistant})</div>`).join('');
    
    let html = `
        <div class="team-card">
            <div class="team-name">📊 РЕЗУЛЬТАТ МАТЧА</div>
            <div>⭐ Твоя команда: ${selectedTeam.map(p => p.name).join(', ')}</div>
            <div>⭐ Средний рейтинг: ${myAvg.toFixed(1)}</div>
            <div>⭐ Команда ${currentOpponent.name}: ${currentOpponent.players.map(p => p.name).join(', ')}</div>
            <div>⭐ Средний рейтинг: ${opponentAvg.toFixed(1)}</div>
            <div>🎲 Шанс победы: ${finalChance.toFixed(1)}%</div>
            <div class="fight-result">${isWin ? '🏆 ПОБЕДА! +' + reward + ' монеты' : '💔 ПОРАЖЕНИЕ... +' + reward + ' монета'}</div>
            <div style="margin-top:15px;"><b>⚽ ГОЛЫ:</b></div>
            <div><b>Твои:</b> ${myGoalsHtml || 'нет голов'}</div>
            <div><b>${currentOpponent.name}:</b> ${opponentGoalsHtml || 'нет голов'}</div>
            <div><b>Счёт:</b> ${totalGoals} : ${totalOpponentGoals}</div>

function registerTournament() {
    let teamName = document.getElementById('teamNameInput')?.value.trim();
    if(!teamName) {
        tg.showAlert('Введи название команды!');
        return;
    }
    if(userTournamentTeam.some(s => s === null)) {
        tg.showAlert('Выбери всех 3 футболистов!');
        return;
    }
    
    userTeamName = teamName;
    
    let allTournamentTeams = [...tournamentTeams];
    allTournamentTeams.push({
        name: userTeamName,
        players: userTournamentTeam,
        isUser: true
    });
    
    for(let i = allTournamentTeams.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [allTournamentTeams[i], allTournamentTeams[j]] = [allTournamentTeams[j], allTournamentTeams[i]];
    }
    
    tournamentState = {
        teams: allTournamentTeams,
        round: 1,
        matches: [],
        winners: []
    };
    
    generateNextRound();
}

function generateNextRound() {
    let teams = tournamentState.round === 1 ? tournamentState.teams : tournamentState.winners;
    let matches = [];
    for(let i = 0; i < teams.length; i += 2) {
        if(i + 1 < teams.length) {
            matches.push({
                team1: teams[i],
                team2: teams[i+1],
                result: null
            });
        } else {
            matches.push({
                team1: teams[i],
                team2: null,
                result: teams[i]
            });
        }
    }
    tournamentState.matches = matches;
    tournamentState.winners = [];
    showTournamentBracket();
}

function showTournamentBracket() {
    let roundNames = ["1/8 финала", "1/4 финала", "1/2 финала", "Финал"];
    let roundName = roundNames[tournamentState.round - 1] || "Финал";
    
    let html = `<div class="team-card"><div class="team-name">🏆 ТУРНИР - ${roundName}</div>`;
    
    for(let i = 0; i < tournamentState.matches.length; i++) {
        let match = tournamentState.matches[i];
        if(match.result) {
            html += `<div style="background:#0f1422;padding:10px;margin:10px 0;border-radius:10px;">
                        ⚔️ ${match.team1.name} ${match.result === match.team1 ? '✅' : ''} vs ${match.team2 ? match.team2.name + (match.result === match.team2 ? ' ✅' : '') : 'AUTO PASS'}
                        <br>🏆 Победитель: ${match.result.name}
                     </div>`;
        } else {
            html += `<div style="background:#0f1422;padding:10px;margin:10px 0;border-radius:10px;">
                        ⚔️ ${match.team1.name} vs ${match.team2 ? match.team2.name : 'AUTO PASS'}
                        ${match.team2 ? `<button class="pack-btn" style="margin-top:10px;" onclick="playMatch(${i})">СИМУЛИРОВАТЬ МАТЧ</button>` : '<div style="color:#2ecc71;">Автоматический проход</div>'}
                     </div>`;
        }
    }
    
    if(tournamentState.winners.length === 1 && tournamentState.matches.length === 0) {
        html += `<div class="fight-result" style="margin-top:20px;">🏆 ПОБЕДИТЕЛЬ ТУРНИРА: ${tournamentState.winners[0].name} 🏆</div>
                 <div>💰 Награда: +50 монет</div>`;
        let d = getData();
        d.coins += 50;
        saveData(d.collection, d.lastOpen, d.adPacksToday, d.lastAdDate, d.coins, d.coinAdsToday, d.lastCoinAdDate);
        updateBalance();
    }
    
    html += `<button class="pack-btn ad-pack-btn" style="margin-top:15px;" onclick="showSection('pack')">ВЕРНУТЬСЯ</button></div>`;
    document.getElementById('tournamentArea').innerHTML = html;
}

function playMatch(matchIndex) {
    let match = tournamentState.matches[matchIndex];
    if(!match.team2) {
        tournamentState.winners.push(match.team1);
        tournamentState.matches.splice(matchIndex, 1);
        if(tournamentState.matches.length === 0 && tournamentState.winners.length > 1) {
            tournamentState.round++;
            generateNextRound();
        } else {
            showTournamentBracket();
        }
        return;
    }
    
    let team1Avg = match.team1.players.reduce((sum,p) => sum + p.rating,0) / 3;
    let team2Avg = match.team2.players.reduce((sum,p) => sum + p.rating,0) / 3;
    let diff = team1Avg - team2Avg;
    let baseChance = 50 + diff * 0.8;
    let luck = (Math.random() - 0.5) * 20;
    let finalChance = Math.min(95, Math.max(5, baseChance + luck));
    let isTeam1Win = Math.random() * 100 < finalChance;
    
    let winner = isTeam1Win ? match.team1 : match.team2;
    match.result = winner;
    
    let goals1 = Math.floor(Math.random() * 3);
    let goals2 = Math.floor(Math.random() * 3);
    if(isTeam1Win && goals1 <= goals2) goals1 = goals2 + 1;
    if(!isTeam1Win && goals2 <= goals1) goals2 = goals1 + 1;
    
    let scorer1 = match.team1.players[Math.floor(Math.random() * 3)];
    let scorer2 = match.team2.players[Math.floor(Math.random() * 3)];
    
    let resultHtml = `
        <div style="background:#0f1422;padding:15px;margin:10px 0;border-radius:15px;">
            <div class="team-name">⚔️ ${match.team1.name} ${goals1} : ${goals2} ${match.team2.name}</div>
            <div>⚽ ${match.team1.name}: ${scorer1.name} (${goals1} гол)</div>
            <div>⚽ ${match.team2.name}: ${scorer2.name} (${goals2} гол)</div>
            <div style="margin-top:10px;">🏆 Победитель: ${winner.name}</div>
        </div>
    `;
    
    tournamentState.winners.push(winner);
    tournamentState.matches.splice(matchIndex, 1);
    
    if(tournamentState.matches.length === 0 && tournamentState.winners.length > 1) {
        tournamentState.round++;
        generateNextRound();
    } else {
        showTournamentBracket();
    }
}
