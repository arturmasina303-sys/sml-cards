        const rarityChance = [
            { stars: 1, chance: 70 },
            { stars: 2, chance: 25 },
            { stars: 3, chance: 5 },
            { stars: 4, chance: 0 },
            { stars: 5, chance: 0 },
            { stars: 6, chance: 0 }
        ];
        
        function getRandomCard() {
            let r = Math.floor(Math.random() * 100) + 1;
            let selectedStars = 1;
            let sum = 0;
            for (let i = 0; i < rarityChance.length; i++) {
                sum += rarityChance[i].chance;
                if (r <= sum) {
                    selectedStars = rarityChance[i].stars;
                    break;
                }
            }
            let cardsWithStars = allCards.filter(c => c.stars === selectedStars);
            if (cardsWithStars.length === 0) return allCards[0];
            return cardsWithStars[Math.floor(Math.random() * cardsWithStars.length)];
        }
        
        function getData() {
            return {
                collection: JSON.parse(localStorage.getItem('collection') || '[]'),
                lastOpen: parseInt(localStorage.getItem('lastOpen') || '0'),
                adPacksToday: parseInt(localStorage.getItem('adPacksToday') || '0'),
                lastAdDate: localStorage.getItem('lastAdDate') || '',
                coins: parseInt(localStorage.getItem('coins') || '0'),
                coinAdsToday: parseInt(localStorage.getItem('coinAdsToday') || '0'),
                lastCoinAdDate: localStorage.getItem('lastCoinAdDate') || ''
            };
        }
        
        function saveData(collection, lastOpen, adPacksToday, lastAdDate, coins, coinAdsToday, lastCoinAdDate) {
            localStorage.setItem('collection', JSON.stringify(collection));
            if (lastOpen !== undefined) localStorage.setItem('lastOpen', lastOpen);
            if (adPacksToday !== undefined) localStorage.setItem('adPacksToday', adPacksToday);
            if (lastAdDate !== undefined) localStorage.setItem('lastAdDate', lastAdDate);
            if (coins !== undefined) localStorage.setItem('coins', coins);
            if (coinAdsToday !== undefined) localStorage.setItem('coinAdsToday', coinAdsToday);
            if (lastCoinAdDate !== undefined) localStorage.setItem('lastCoinAdDate', lastCoinAdDate);
            updateBalanceDisplay();
        }
        
        function resetAdCounterIfNewDay() {
            let data = getData();
            let today = new Date().toDateString();
            if (data.lastAdDate !== today) {
                data.adPacksToday = 0;
                data.lastAdDate = today;
                saveData(data.collection, data.lastOpen, 0, today, data.coins, data.coinAdsToday, data.lastCoinAdDate);
            }
            if (data.lastCoinAdDate !== today) {
                data.coinAdsToday = 0;
                data.lastCoinAdDate = today;
                saveData(data.collection, data.lastOpen, data.adPacksToday, data.lastAdDate, data.coins, 0, today);
            }
            updateAdLimitDisplay();
            updateCoinAdLimitDisplay();
        }
        
        function updateAdLimitDisplay() {
            let data = getData();
            let remaining = 7 - (data.adPacksToday || 0);
            let el = document.getElementById('adLimitDisplay');
            if (el) el.innerHTML = `🎥 Осталось рекламных паков: ${remaining}`;
        }
        
        function updateCoinAdLimitDisplay() {
            let data = getData();
            let remaining = 2 - (data.coinAdsToday || 0);
            let el = document.getElementById('coinAdLimitDisplay');
            if (el) el.innerHTML = `💰 Осталось реклам за монеты: ${remaining}`;
        }
        
        function updateBalanceDisplay() {
            let data = getData();
            let coinEl = document.getElementById('coinBalance');
            let shopCoinEl = document.getElementById('shopCoinBalance');
            if (coinEl) coinEl.innerText = data.coins;
            if (shopCoinEl) shopCoinEl.innerText = data.coins;
        }
        
        function giveAdPackReward() {
            let data = getData();
            let card = getRandomCard();
            data.collection.push(card);
            data.adPacksToday++;
            saveData(data.collection, data.lastOpen, data.adPacksToday, data.lastAdDate, data.coins, data.coinAdsToday, data.lastCoinAdDate);
            updateAdLimitDisplay();
            
            let imgHtml = `<div class="card-img no-photo" style="height:150px;">🎴</div>`;
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 РЕКЛАМНЫЙ ПАК!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 Рекламный пак: ${card.name} (${'⭐'.repeat(card.stars)})`);
        }
        
        function openAdPack() {
            resetAdCounterIfNewDay();
            let data = getData();
            
            if (data.adPacksToday >= 7) {
                tg.showAlert('❌ Лимит на сегодня (7 паков) исчерпан! Завтра будут новые.');
                return;
            }
            
            if (typeof monetag !== 'undefined') {
                monetag('showRewardedAd', ZONE_ID, function(success) {
                    if (success) {
                        giveAdPackReward();
                    } else {
                        tg.showAlert('❌ Реклама не была просмотрена до конца.');
                    }
                });
            } else {
                tg.showAlert('🎥 Тестовый режим: реклама пропущена.');
                giveAdPackReward();
            }
        }

            let now = Date.now();
            let twoHours = 2 * 60 * 60 * 1000;

                let left = twoHours - (now - data.lastOpen);
                let hours = Math.floor(le
