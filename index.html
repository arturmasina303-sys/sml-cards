<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SML Лига</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a, #0a1a3a);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 450px; margin: 0 auto; }
        .card {
            background: #1a2a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .menu-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .menu-btn {
            flex: 1;
            background: #2a3a5a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-btn.active { background: #e94560; }
        .pack-btn {
            background: linear-gradient(135deg, #e94560, #b52b43);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .result-area {
            background: #0f1422;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .card-img {
            width: 200px;
            max-width: 100%;
            border-radius: 15px;
            margin: 10px auto;
            display: block;
        }
        .collection-grid, .pvp-collection-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        .collection-card {
            width: 100px;
            background: #0f1422;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .collection-card.selected {
            background: #e94560;
            transform: scale(1.02);
        }
        .collection-card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }
        .collection-card .name {
            font-size: 11px;
            margin-top: 5px;
            color: #ffd966;
        }
        .selected-mark {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 20px;
            color: #ffd966;
        }
        .team-card {
            background: #0f1422;
            border-radius: 12px;
            padding: 10px;
            margin: 5px;
            display: inline-block;
            text-align: center;
            width: 90px;
        }
        .team-card img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
        }
        .team-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }
        .vs {
            font-size: 24px;
            font-weight: bold;
            color: #ffd966;
            margin: 10px;
        }
        .goal-list {
            font-size: 12px;
            text-align: left;
            margin-top: 10px;
            padding: 10px;
            background: #0a0f2a;
            border-radius: 10px;
        }
        .hidden { display: none; }
        .selected-team {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .ad-limit {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showSection('pack')">📦 Пак</button>
            <button class="menu-btn" onclick="showSection('collection')">📋 Коллекция</button>
            <button class="menu-btn" onclick="showSection('tournament')">🏆 Турнир</button>
        </div>

        <div id="packSection" class="card">
            <button class="pack-btn" onclick="openFreePack()">📦 БЕСПЛАТНЫЙ ПАК (раз/2ч)</button>
            <div class="timer" id="timer">✅ Пак доступен</div>
            <button class="pack-btn ad-pack-btn" onclick="openAdPack()">🎥 РЕКЛАМНЫЙ ПАК (7/день)</button>
            <div class="ad-limit" id="adLimitDisplay">🎥 Осталось рекламных паков: 7</div>
            <div id="packResult" class="result-area"><p>Нажми кнопку</p></div>
        </div>

        <div id="collectionSection" class="card hidden">
            <h3>🎴 Моя коллекция</h3>
            <div id="collectionGrid" class="collection-grid"><p>Загрузка...</p></div>
        </div>

        <div id="tournamentSection" class="card hidden">
            <h3>🏆 ЛИГА ЧЕМПИОНОВ 🏆</h3>
            <div id="selectedTeamDisplay" class="selected-team">
                <p>👥 Выбрано: <span id="selectedCount">0</span>/3</p>
                <div id="selectedPlayersList" style="font-size: 12px; color: #aaa;"></div>
            </div>
            <div id="tournamentCollectionGrid" class="collection-grid"><p>Загрузка...</p></div>
            <button class="pack-btn" onclick="startTournament()">🏆 СТАРТ ТУРНИРА</button>
            <div id="tournamentResult" class="result-area"><p>Выбери 3 игроков и нажми "Старт турнира"</p></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        const ZONE_ID = "10759776";
        
        const allCards = [
            { name: "Messi", img: "messi.jpg", stars: 6, rating: 96 },
            { name: "Ronaldo", img: "ronaldo.jpg", stars: 5, rating: 92 },
            { name: "Haaland", img: "haaland.jpg", stars: 5, rating: 92 },
            { name: "Mbappe", img: "mbappe.jpg", stars: 5, rating: 92 },
            { name: "De Bruyne", img: "debruyne.jpg", stars: 4, rating: 88 },
            { name: "Van Dijk", img: "vandijk.jpg", stars: 4, rating: 88 },
            { name: "Salah", img: "salah.jpg", stars: 3, rating: 84 },
            { name: "Vinicius Jr", img: "vinicius.jpg", stars: 3, rating: 84 },
            { name: "Rodri", img: "rodri.jpg", stars: 3, rating: 84 },
            { name: "Pedri", img: "pedri.jpg", stars: 2, rating: 78 },
            { name: "Foden", img: "foden.jpg", stars: 2, rating: 78 },
            { name: "Gavi", img: "gavi.jpg", stars: 1, rating: 70 },
            { name: "Fati", img: "fati.jpg", stars: 1, rating: 70 }
        ];
        
        const rarityChance = [
            { stars: 1, chance: 48 },
            { stars: 2, chance: 31 },
            { stars: 3, chance: 12 },
            { stars: 4, chance: 5 },
            { stars: 5, chance: 3 },
            { stars: 6, chance: 1 }
        ];
        
        let selectedPlayers = [];
        
        function getRandomCard() {
            let r = Math.floor(Math.random() * 100) + 1;
            let selectedStars = 1;
            let sum = 0;
            for (let i = 0; i < rarityChance.length; i++) {
                sum += rarityChance[i].chance;
                if (r <= sum) {
                    selectedStars = rarityChance[i].stars;
                    break;
                }
            }
            let cardsWithStars = allCards.filter(c => c.stars === selectedStars);
            if (cardsWithStars.length === 0) return allCards[0];
            return cardsWithStars[Math.floor(Math.random() * cardsWithStars.length)];
        }
        
        function getData() {
            return {
                collection: JSON.parse(localStorage.getItem('collection') || '[]'),
                lastOpen: parseInt(localStorage.getItem('lastOpen') || '0'),
                adPacksToday: parseInt(localStorage.getItem('adPacksToday') || '0'),
                lastAdDate: localStorage.getItem('lastAdDate') || ''
            };
        }
        
        function saveData(collection, lastOpen, adPacksToday, lastAdDate) {
            localStorage.setItem('collection', JSON.stringify(collection));
            if (lastOpen !== undefined) localStorage.setItem('lastOpen', lastOpen);
            if (adPacksToday !== undefined) localStorage.setItem('adPacksToday', adPacksToday);
            if (lastAdDate !== undefined) localStorage.setItem('lastAdDate', lastAdDate);
        }
        
        function resetAdCounterIfNewDay() {
            let data = getData();
            let today = new Date().toDateString();
            if (data.lastAdDate !== today) {
                saveData(data.collection, data.lastOpen, 0, today);
                updateAdLimitDisplay();
            }
        }
        
        function updateAdLimitDisplay() {
            let data = getData();
            let remaining = 7 - (data.adPacksToday || 0);
            document.getElementById('adLimitDisplay').innerHTML = `🎥 Осталось рекламных паков: ${remaining}`;
        }
        
        function openAdPack() {
            resetAdCounterIfNewDay();
            let data = getData();
            
            if (data.adPacksToday >= 7) {
                tg.showAlert('❌ Лимит на сегодня (7 паков) исчерпан! Завтра будут новые.');
                return;
            }
            
            if (typeof monetag !== 'undefined') {
                monetag('showRewardedAd', ZONE_ID, function(success) {
                    if (success) {
                        giveAdPackReward();
                    } else {
                        tg.showAlert('❌ Реклама не была просмотрена до конца.');
                    }
                });
            } else {
                tg.showAlert('🎥 Тестовый режим: реклама пропущена.');
                giveAdPackReward();
            }
        }
        
        function giveAdPackReward() {
            let data = getData();
            let card = getRandomCard();
            data.collection.push({ name: card.name, img: card.img, stars: card.stars, rating: card.rating });
            data.adPacksToday++;
            saveData(data.collection, data.lastOpen, data.adPacksToday, data.lastAdDate);
            updateAdLimitDisplay();
            
            let imgHtml = `<img class="card-img" src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">`;
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 РЕКЛАМНЫЙ ПАК!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 Рекламный пак: ${card.name} (${'⭐'.repeat(card.stars)})`);
        }
        
        function openFreePack() {
            let data = getData();
            let now = Date.now();
            let twoHours = 2 * 60 * 60 * 1000;
            
            if (data.lastOpen && now - data.lastOpen < twoHours) {
                let left = twoHours - (now - data.lastOpen);
                let hours = Math.floor(left / 3600000);
                let minutes = Math.floor((left % 3600000) / 60000);
                tg.showAlert(`⏳ Подожди ${hours}ч ${minutes}мин до следующего бесплатного пака`);
                return;
            }
            
            let card = getRandomCard();
            data.collection.push({ name: card.name, img: card.img, stars: card.stars, rating: card.rating });
            saveData(data.collection, now, data.adPacksToday, data.lastAdDate);
            
            let imgHtml = `<img class="card-img" src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">`;
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 ВЫПАЛО!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 ${card.name} (${'⭐'.repeat(card.stars)})`);
            updateTimer();
        }
        
        function showCollection() {
            let data = getData();
            let collection = data.collection;
            if (collection.length === 0) {
                document.getElementById('collectionGrid').innerHTML = '<p>📭 Нет карточек. Открой пак!</p>';
                return;
            }
            let html = '';
            collection.forEach(card => {
                html += `
                    <div class="collection-card">
                        <img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">
                        <div class="name">${card.name}</div>
                        <div style="font-size: 10px;">${'⭐'.repeat(card.stars)}</div>
                    </div>
                `;
            });
            document.getElementById('collectionGrid').innerHTML = html;
        }
        
        function updateTimer() {
            let data = getData();
            let now = Date.now();
            let twoHours = 2 * 60 * 60 * 1000;
            let timer = document.getElementById('timer');
            if (data.lastOpen && now - data.lastOpen < twoHours) {
                let left = twoHours - (now - data.lastOpen);
                let hours = Math.floor(left / 3600000);
                let minutes = Math.floor((left % 3600000) / 60000);
                timer.textContent = `⏱️ Следующий бесплатный пак через ${hours}ч ${minutes}мин`;
            } else {
                timer.textContent = '✅ Бесплатный пак доступен!';
            }
        }
        
        // ========== ТУРНИР ==========
        function loadTournamentCollection() {
            let data = getData();
            let collection = data.collection;
            if (collection.length === 0) {
                document.getElementById('tournamentCollectionGrid').innerHTML = '<p>📭 Нет карточек. Открой паки!</p>';
                return;
            }
            let html = '';
            collection.forEach(card => {
                let isSelected = selectedPlayers.some(p => p.name === card.name);
                html += `
                    <div class="collection-card ${isSelected ? 'selected' : ''}" onclick="toggleTournamentPlayer('${card.name}', ${card.rating}, '${card.img}', ${card.stars})">
                        <img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">
                        <div class="name">${card.name}</div>
                        <div style="font-size: 10px;">${'⭐'.repeat(card.stars)} (${card.rating})</div>
                        ${isSelected ? '<div class="selected-mark">✓</div>' : ''}
                    </div>
                `;
            });
            document.getElementById('tournamentCollectionGrid').innerHTML = html;
            updateTournamentSelectedDisplay();
        }
        
        function toggleTournamentPlayer(name, rating, img, stars) {
            let existing = selectedPlayers.find(p => p.name === name);
            if (existing) {
                selectedPlayers = selectedPlayers.filter(p => p.name !== name);
            } else {
                if (selectedPlayers.length >= 3) {
                    tg.showAlert('Можно выбрать только 3 игроков!');
                    return;
                }
                selectedPlayers.push({ name, rating, img, stars });
            }
            loadTournamentCollection();
        }
        
        function updateTournamentSelectedDisplay() {
            document.getElementById('selectedCount').innerText = selectedPlayers.length;
            if (selectedPlayers.length === 0) {
                document.getElementById('selectedPlayersList').innerHTML = '';
                return;
            }
            let html = '<div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">';
            selectedPlayers.forEach(p => {
                html += `<div style="background: #1a2a4a; padding: 5px 10px; border-radius: 20px;">${p.name} (${p.rating})</div>`;
            });
            html += '</div>';
            document.getElementById('selectedPlayersList').innerHTML = html;
        }
        
        function getRandomOpponent(stage) {
            let minRating = stage === '1/8' ? 70 : stage === '1/4' ? 78 : stage === '1/2' ? 84 : 88;
            let maxRating = stage === '1/8' ? 84 : stage === '1/4' ? 88 : stage === '1/2' ? 92 : 96;
            
            let available = allCards.filter(p => p.rating >= minRating && p.rating <= maxRating);
            if (available.length === 0) available = allCards;
            
            let shuffled = [...available];
            for (let i = shuffled.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            let team = shuffled.slice(0, 3);
            let power = team.reduce((sum, p) => sum + p.rating, 0);
            return { team, power };
        }
        
        function generateGoals(team, totalGoals) {
            let scorers = [];
            let remaining = totalGoals;
            for (let i = 0; i < team.length; i++) {
                let maxGoals = Math.min(remaining, team.length === 1 ? remaining : Math.floor(Math.random() * (remaining + 1)));
                if (i === team.length - 1) maxGoals = remaining;
                let playerGoals = Math.floor(Math.random() * (maxGoals + 1));
                if (playerGoals > 0) {
                    scorers.push({ name: team[i].name, goals: playerGoals });
                }
                remaining -= playerGoals;
                if (remaining === 0) break;
            }
            
            let assistsList = [];
            scorers.forEach(scorer => {
                for (let i = 0; i < scorer.goals; i++) {
                    let possibleAssistants = team.filter(p => p.name !== scorer.name);
                    if (possibleAssistants.length > 0) {
                        let assistant = possibleAssistants[Math.floor(Math.random() * possibleAssistants.length)];
                        assistsList.push({ goal: scorer.name, assist: assistant.name });
                    }
                }
            });
            
            return { scorers, assistsList };
        }
        
        function startTournament() {
            if (selectedPlayers.length !== 3) {
                tg.showAlert('Выбери 3 игроков для участия в турнире!');
                return;
            }
            
            let myPower = selectedPlayers.reduce((sum, p) => sum + p.rating, 0);
            let stages = ['1/8', '1/4', '1/2', 'final'];
            let results = [];
            let won = true;
            let loseStage = '';
            
            for (let i = 0; i < stages.length; i++) {
                let opponent = getRandomOpponent(stages[i]);
                let myScore, oppScore;
                let result = '';
                
                if (myPower > opponent.power) {
                    myScore = Math.floor(Math.random() * 3) + 2;
                    oppScore = Math.floor(Math.random() * 2);
                    result = 'win';
                } else if (myPower < opp
