<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SML Карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Monetag SDK -->
    <script src='https://static.monetag.io/sdk.js' data-zone='10759776' data-sdk='show_10759776'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a, #0a1a3a);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 450px; margin: 0 auto; }
        .card {
            background: #1a2a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .menu-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .menu-btn {
            flex: 1;
            background: #2a3a5a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-btn.active { background: #e94560; }
        .pack-btn {
            background: linear-gradient(135deg, #e94560, #b52b43);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .ad-pack-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        .result-area {
            background: #0f1422;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .card-img {
            width: 200px;
            max-width: 100%;
            border-radius: 15px;
            margin: 10px auto;
            display: block;
        }
        .timer { font-size: 14px; color: #aaa; margin-top: 15px; text-align: center; }
        .collection-grid, .sbc-collection-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        .collection-card {
            width: 100px;
            background: #0f1422;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .collection-card.selected {
            background: #e94560;
            transform: scale(1.02);
        }
        .collection-card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }
        .collection-card .name {
            font-size: 11px;
            margin-top: 5px;
            color: #ffd966;
        }
        .selected-mark {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 20px;
            color: #ffd966;
        }
        .sbc-item {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .sbc-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffd966;
        }
        .sbc-condition {
            font-size: 12px;
            margin-top: 5px;
            color: #aaa;
        }
        .sbc-reward {
            color: #4caf50;
            margin-top: 5px;
        }
        .hidden { display: none; }
        .selected-team {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .ad-limit {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showSection('pack')">📦 Пак</button>
            <button class="menu-btn" onclick="showSection('collection')">📋 Коллекция</button>
            <button class="menu-btn" onclick="showSection('sbc')">🏆 SBC</button>
        </div>

        <div id="packSection" class="card">
            <button class="pack-btn" onclick="openFreePack()">📦 БЕСПЛАТНЫЙ ПАК (раз/2ч)</button>
            <div class="timer" id="timer">✅ Пак доступен</div>
            <button class="pack-btn ad-pack-btn" onclick="openAdPack()">🎥 РЕКЛАМНЫЙ ПАК (7/день)</button>
            <div class="ad-limit" id="adLimitDisplay">🎥 Осталось рекламных паков: 7</div>
            <div id="packResult" class="result-area"><p>Нажми кнопку</p></div>
        </div>

        <div id="collectionSection" class="card hidden">
            <h3>🎴 Моя коллекция</h3>
            <div id="collectionGrid" class="collection-grid"><p>Загрузка...</p></div>
        </div>

        <div id="sbcSection" class="card hidden">
            <h3>🏆 SBC ЗАДАНИЯ</h3>
            <div id="sbcList"></div>
            <div id="sbcResult" class="result-area"><p>Выбери задание</p></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        const ZONE_ID = "10759776";
        
        // ========== КАРТОЧКИ С КЛУБАМИ И СТРАНАМИ ==========
        const allCards = [
            { name: "Messi", img: "messi.jpg", stars: 6, rating: 96, club: "Barcelona", country: "Argentina" },
            { name: "Ronaldo", img: "ronaldo.jpg", stars: 5, rating: 92, club: "Man United", country: "Portugal" },
            { name: "Haaland", img: "haaland.jpg", stars: 5, rating: 92, club: "Dortmund", country: "Norway" },
            { name: "Mbappe", img: "mbappe.jpg", stars: 5, rating: 92, club: "PSG", country: "France" },
            { name: "De Bruyne", img: "debruyne.jpg", stars: 4, rating: 88, club: "Man City", country: "Belgium" },
            { name: "Van Dijk", img: "vandijk.jpg", stars: 4, rating: 88, club: "Liverpool", country: "Netherlands" },
            { name: "Salah", img: "salah.jpg", stars: 3, rating: 84, club: "Liverpool", country: "Egypt" },
            { name: "Vinicius Jr", img: "vinicius.jpg", stars: 3, rating: 84, club: "Real Madrid", country: "Brazil" },
            { name: "Rodri", img: "rodri.jpg", stars: 3, rating: 84, club: "Man City", country: "Spain" },
            { name: "Pedri", img: "pedri.jpg", stars: 2, rating: 78, club: "Barcelona", country: "Spain" },
            { name: "Foden", img: "foden.jpg", stars: 2, rating: 78, club: "Man City", country: "England" },
            { name: "Gavi", img: "gavi.jpg", stars: 1, rating: 70, club: "Barcelona", country: "Spain" },
            { name: "Fati", img: "fati.jpg", stars: 1, rating: 70, club: "Barcelona", country: "Spain" },
            { name: "Neuer", img: "neuer.jpg", stars: 4, rating: 88, club: "Bayern", country: "Germany" },
            { name: "Kimmich", img: "kimmich.jpg", stars: 4, rating: 88, club: "Bayern", country: "Germany" },
            { name: "Musiala", img: "musiala.jpg", stars: 3, rating: 84, club: "Bayern", country: "Germany" },
            { name: "Lautaro", img: "lautaro.jpg", stars: 4, rating: 88, club: "Inter", country: "Argentina" },
            { name: "Barella", img: "barella.jpg", stars: 3, rating: 84, club: "Inter", country: "Italy" },
            { name: "Calhanoglu", img: "calhanoglu.jpg", stars: 3, rating: 84, club: "Inter", country: "Turkey" },
            { name: "Isco", img: "isco.jpg", stars: 3, rating: 84, club: "Betis", country: "Spain" },
            { name: "Fekir", img: "fekir.jpg", stars: 3, rating: 84, club: "Betis", country: "France" }
        ];
        
        const rarityChance = [
            { stars: 1, chance: 48 },
            { stars: 2, chance: 31 },
            { stars: 3, chance: 12 },
            { stars: 4, chance: 5 },
            { stars: 5, chance: 3 },
            { stars: 6, chance: 1 }
        ];
        
        // ========== SBC ЗАДАНИЯ ==========
        const sbcChallenges = [
            {
                id: 1,
                name: "🏆 Мбаппе",
                reward: { name: "Mbappe", img: "mbappe.jpg", stars: 5, rating: 92, club: "PSG", country: "France" },
                conditions: [
                    { type: "country", value: "France", count: 4 },
                    { type: "club", value: "Real Madrid", count: 3 }
                ]
            },
            {
                id: 2,
                name: "🧤 Соммер",
                reward: { name: "Sommer", img: "sommer.jpg", stars: 4, rating: 88, club: "Bayern", country: "Switzerland" },
                conditions: [
                    { type: "club", value: "Bayern", count: 2 },
                    { type: "club", value: "Inter", count: 2 }
                ]
            },
            {
                id: 3,
                name: "⭐ Касадо",
                reward: { name: "Casado", img: "casado.jpg", stars: 3, rating: 84, club: "Betis", country: "Spain" },
                conditions: [
                    { type: "country", value: "Spain", count: 5 },
                    { type: "club", value: "Betis", count: 1 }
                ]
            }
        ];
        
        let selectedForSbc = null;
        let selectedCards = [];
        
        function getRandomCard() {
            let r = Math.floor(Math.random() * 100) + 1;
            let selectedStars = 1;
            let sum = 0;
            for (let i = 0; i < rarityChance.length; i++) {
                sum += rarityChance[i].chance;
                if (r <= sum) {
                    selectedStars = rarityChance[i].stars;
                    break;
                }
            }
            let cardsWithStars = allCards.filter(c => c.stars === selectedStars);
            if (cardsWithStars.length === 0) return allCards[0];
            return cardsWithStars[Math.floor(Math.random() * cardsWithStars.length)];
        }
        
        function getData() {
            return {
                collection: JSON.parse(localStorage.getItem('collection') || '[]'),
                lastOpen: parseInt(localStorage.getItem('lastOpen') || '0'),
                adPacksToday: parseInt(localStorage.getItem('adPacksToday') || '0'),
                lastAdDate: localStorage.getItem('lastAdDate') || ''
            };
        }
        
        function saveData(collection, lastOpen, adPacksToday, lastAdDate) {
            localStorage.setItem('collection', JSON.stringify(collection));
            if (lastOpen !== undefined) localStorage.setItem('lastOpen', lastOpen);
            if (adPacksToday !== undefined) localStorage.setItem('adPacksToday', adPacksToday);
            if (lastAdDate !== undefined) localStorage.setItem('lastAdDate', lastAdDate);
        }
        
        function resetAdCounterIfNewDay() {
            let data = getData();
            let today = new Date().toDateString();
            if (data.lastAdDate !== today) {
                saveData(data.collection, data.lastOpen, 0, today);
                updateAdLimitDisplay();
            }
        }
        
        function updateAdLimitDisplay() {
            let data = getData();
            let remaining = 7 - (data.adPacksToday || 0);
            document.getElementById('adLimitDisplay').innerHTML = `🎥 Осталось рекламных паков: ${remaining}`;
        }
        
        function openAdPack() {
            resetAdCounterIfNewDay();
            let data = getData();
            
            if (data.adPacksToday >= 7) {
                tg.showAlert('❌ Лимит на сегодня (7 паков) исчерпан! Завтра будут новые.');
                return;
            }
            
            if (typeof monetag !== 'undefined') {
                monetag('showRewardedAd', ZONE_ID, function(success) {
                    if (success) {
                        giveAdPackReward();
                    } else {
                        tg.showAlert('❌ Реклама не была просмотрена до конца.');
                    }
                });
            } else {
                tg.showAlert('🎥 Тестовый режим: реклама пропущена.');
                giveAdPackReward();
            }
        }
        
        function giveAdPackReward() {
            let data = getData();
            let card = getRandomCard();
            data.collection.push(card);
            data.adPacksToday++;
            saveData(data.collection, data.lastOpen, data.adPacksToday, data.lastAdDate);
            updateAdLimitDisplay();
            
            let imgHtml = `<img class="card-img" src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">`;
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 РЕКЛАМНЫЙ ПАК!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 Рекламный пак: ${card.name} (${'⭐'.repeat(card.stars)})`);
        }
        
        function openFreePack() {
            let data = getData();
            let now = Date.now();
            let twoHours = 2 * 60 * 60 * 1000;
            
            if (data.lastOpen && now - data.lastOpen < twoHours) {
                let left = twoHours - (now - data.lastOpen);
                let hours = Math.floor(left / 3600000);
                let minutes = Math.floor((left % 3600000) / 60000);
                tg.showAlert(`⏳ Подожди ${hours}ч ${minutes}мин до следующего бесплатного пака`);
                return;
            }
            
            let card = getRandomCard();
            data.collection.push(card);
            saveData(data.collection, now, data.adPacksToday, data.lastAdDate);
            
            let imgHtml = `<img class="card-img" src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">`;
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 ВЫПАЛО!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 ${card.name} (${'⭐'.repeat(card.stars)})`);
            updateTimer();
        }
        
        function showCollection() {
            let data = getData();
            let collection = data.collection;
            if (collection.length === 0) {
                document.getElementById('collectionGrid').innerHTML = '<p>📭 Нет карточек. Открой пак!</p>';
                return;
            }
            let html = '';
            collection.forEach(card => {
                html += `
                    <div class="collection-card">
                        <img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">
                        <div class="name">${card.name}</div>
                        <div style="font-size: 10px;">${'⭐'.repeat(card.stars)}</div>
                    </div>
                `;
            });
            document.getElementById('collectionGrid').innerHTML = html;
        }
        
        function updateTimer() {
            let data = getData();
            let now = Date.now();
            let twoHours = 2 * 60 * 60 * 1000;
            let timer = document.getElementById('timer');
            if (data.lastOpen && now - data.lastOpen < twoHours) {
                let left = twoHours - (now - data.lastOpen);
                let hours = Math.floor(left / 3600000);
                let minutes = Math.floor((left % 3600000) / 60000);
                timer.textContent = `⏱️ Следующий бесплатный пак через ${hours}ч ${minutes}мин`;
            } else {
                timer.textContent = '✅ Бесплатный пак доступен!';
            }
        }
        
        // ========== SBC ==========
        function renderSBCList() {
            let html = '';
            sbcChallenges.forEach(sbc => {
                html += `
                    <div class="sbc-item" onclick="selectSBC(${sbc.id})">
                        <div class="sbc-title">${sbc.name}</div>
                        <div class="sbc-condition">${sbc.conditions.map(c => `${c.count} x ${c.type === 'country' ? '🇫🇷 ' + c.value : '🏆 ' + c.value}`).join(' + ')}</div>
                        <div class="sbc-reward">🎁 Награда: ${sbc.reward.name} (${'⭐'.repeat(sbc.reward.stars)}, ${sbc.reward.rating})</div>
                    </div>
                `;
            });
            document.getElementById('sbcList').innerHTML = html;
        }
        
        function selectSBC(sbcId) {
            selectedForSbc = sbcChallenges.find(s => s.id === sbcId);
            selectedCards = [];
            loadSBCCollection();
        }
        
        function loadSBCCollection() {
            let data = getData();
            let collection = data.collection;
            if (collection.length === 0) {
                document.getElementById('sbcCollectionGrid').innerHTML = '<p>📭 Нет карточек. Открой паки!</p>';
                return;
            }
            let html = '';
            collection.forEach(card => {
                let isSelected = selectedCards.some(c => c.name === card.name);
                html += `
                    <div class="collection-card ${isSelected ? 'selected' : ''}" onclick="toggleSbcCard('${card.name}', ${card.rating}, '${card.img}', ${card.stars}, '${card.club}', '${card.country}')">
                        <img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">
                        <div class="name">${card.name}</div>
                        <div style="font-size: 10px;">${'⭐'.repeat(card.stars)} (${card.rating})</div>
                        <div style="font-size: 9px;">${card.club} | ${card.country}</div>
                        ${isSelected ? '<div class="selected-mark">✓</div>' : ''}
                    </div>
                `;
            });
            document.getElementById('sbcCollectionGrid').innerHTML = html;
            updateSbcDisplay();
        }
        
        function toggleSbcCard(name, rating, img, stars, club, country) {
            let existing = selectedCards.find(c => c.name === name);
            if (existing) {
                selectedCards = selectedCards.filter(c => c.name !== name);
            } else {
                selectedCards.push({ name, rating, img, stars, club, country });
            }
            loadSBCCollection();
        }
        
        function updateSbcDisplay() {
            if (!selectedForSbc) {
                document.getElementById('sbcResult').innerHTML = '<p>Выбери задание из списка выше</p>';
                return;
            }
            
            // Проверяем условия
            let conditionsMet = true;
            let conditionDetails = [];
            
            for (let cond of selectedForSbc.conditions) {
                let count = 0;
                if (cond.type === 'club') {
                    count = selectedCards.filter(c => c.club === cond.value).length;
                } else if (cond.type === 'country') {
                    count = selectedCards.filter(c => c.country === cond.value).length;
                }
                let met = count >= cond.count;
                conditionsMet = conditionsMet && met;
                conditionDetails.push(`${cond.type === 'club' ? '🏆' : '🇫
