<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SML Карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a, #0a1a3a);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 450px; margin: 0 auto; }
        .card {
            background: #1a2a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .menu-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .menu-btn {
            flex: 1;
            background: #2a3a5a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-btn.active { background: #e94560; }
        .pack-btn {
            background: linear-gradient(135deg, #e94560, #b52b43);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .result-area {
            background: #0f1422;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .card-img {
            width: 200px;
            max-width: 100%;
            border-radius: 15px;
            margin: 10px auto;
            display: block;
        }
        .timer { font-size: 14px; color: #aaa; margin-top: 15px; text-align: center; }
        .collection-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }
        .collection-card {
            width: 100px;
            background: #0f1422;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .collection-card.selected {
            background: #e94560;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(233,69,96,0.5);
        }
        .collection-card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }
        .collection-card .name {
            font-size: 11px;
            margin-top: 5px;
            color: #ffd966;
        }
        .selected-mark {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 20px;
            color: #ffd966;
        }
        .team-card {
            background: #0f1422;
            border-radius: 12px;
            padding: 10px;
            margin: 5px;
            display: inline-block;
            text-align: center;
            width: 90px;
        }
        .team-card img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
        }
        .team-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }
        .vs {
            font-size: 24px;
            font-weight: bold;
            color: #ffd966;
            margin: 10px;
        }
        .goal-list {
            font-size: 12px;
            text-align: left;
            margin-top: 10px;
            padding: 10px;
            background: #0a0f2a;
            border-radius: 10px;
        }
        .hidden { display: none; }
        .selected-team {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showSection('pack')">📦 Пак</button>
            <button class="menu-btn" onclick="showSection('collection')">📋 Коллекция</button>
            <button class="menu-btn" onclick="showSection('pvp')">⚔️ PvP</button>
        </div>

        <div id="packSection" class="card">
            <button class="pack-btn" onclick="openFreePack()">📦 ОТКРЫТЬ БЕСПЛАТНЫЙ ПАК</button>
            <div class="timer" id="timer">✅ Пак доступен</div>
            <div id="packResult" class="result-area"><p>Нажми кнопку</p></div>
        </div>

        <div id="collectionSection" class="card hidden">
            <h3>🎴 Моя коллекция</h3>
            <div id="collectionGrid" class="collection-grid"><p>Загрузка...</p></div>
        </div>

        <div id="pvpSection" class="card hidden">
            <h3>⚔️ ВЫБЕРИ 3 ИГРОКОВ</h3>
            <div id="selectedTeamDisplay" class="selected-team">
                <p>👥 Выбрано: <span id="selectedCount">0</span>/3</p>
                <div id="selectedPlayersList" style="font-size: 12px; color: #aaa;"></div>
            </div>
            <div id="pvpCollectionGrid" class="collection-grid" style="max-height: 300px;">
                <p>Загрузка...</p>
            </div>
            <button class="pack-btn" id="fightBtn" onclick="startMatch()" style="margin-top: 15px;">⚔️ НАЧАТЬ МАТЧ</button>
            <div id="matchResult" class="result-area"><p>Выбери 3 игроков и нажми "Начать матч"</p></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        // СПИСОК ВСЕХ КАРТОЧЕК
        const allCards = [
            { name: "Messi", img: "messi.jpg", stars: 6, rating: 96 },
            { name: "Ronaldo", img: "ronaldo.jpg", stars: 5, rating: 92 },
            { name: "Haaland", img: "haaland.jpg", stars: 5, rating: 92 },
            { name: "Mbappe", img: "mbappe.jpg", stars: 5, rating: 92 },
            { name: "De Bruyne", img: "debruyne.jpg", stars: 4, rating: 88 },
            { name: "Van Dijk", img: "vandijk.jpg", stars: 4, rating: 88 },
            { name: "Salah", img: "salah.jpg", stars: 3, rating: 84 },
            { name: "Vinicius Jr", img: "vinicius.jpg", stars: 3, rating: 84 },
            { name: "Rodri", img: "rodri.jpg", stars: 3, rating: 84 },
            { name: "Pedri", img: "pedri.jpg", stars: 2, rating: 78 },
            { name: "Foden", img: "foden.jpg", stars: 2, rating: 78 },
            { name: "Gavi", img: "gavi.jpg", stars: 1, rating: 70 },
            { name: "Fati", img: "fati.jpg", stars: 1, rating: 70 }
        ];
        
        // ВЕРОЯТНОСТИ
        const rarityChance = [
            { stars: 1, chance: 48 },
            { stars: 2, chance: 31 },
            { stars: 3, chance: 12 },
            { stars: 4, chance: 5 },
            { stars: 5, chance: 3 },
            { stars: 6, chance: 1 }
        ];
        
        let selectedPlayers = [];
        
        function getRandomCard() {
            let r = Math.floor(Math.random() * 100) + 1;
            let selectedStars = 1;
            let sum = 0;
            for (let i = 0; i < rarityChance.length; i++) {
                sum += rarityChance[i].chance;
                if (r <= sum) {
                    selectedStars = rarityChance[i].stars;
                    break;
                }
            }
            let cardsWithStars = allCards.filter(c => c.stars === selectedStars);
            return cardsWithStars[Math.floor(Math.random() * cardsWithStars.length)];
        }
        
        function getData() {
            return {
                collection: JSON.parse(localStorage.getItem('collection') || '[]'),
                lastOpen: parseInt(localStorage.getItem('lastOpen') || '0')
            };
        }
        
        function saveData(collection, lastOpen) {
            localStorage.setItem('collection', JSON.stringify(collection));
            if (lastOpen !== undefined) localStorage.setItem('lastOpen', lastOpen);
        }
        
        function openFreePack() {
            let data = getData();
            let now = Date.now();
            if (data.lastOpen && now - data.lastOpen < 3600000) {
                let left = 3600000 - (now - data.lastOpen);
                tg.showAlert(`⏳ Подожди ${Math.floor(left/60000)}:${Math.floor((left%60000)/1000).toString().padStart(2,'0')}`);
                return;
            }
            
            let card = getRandomCard();
            data.collection.push({ name: card.name, img: card.img, stars: card.stars, rating: card.rating });
            saveData(data.collection, now);
            
            let imgHtml = `<img class="card-img" src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">`;
            document.getElementById('packResult').innerHTML = `
                <h2>🎴 ВЫПАЛО!</h2>
                ${imgHtml}
                <div style="font-size: 24px; margin: 10px 0;">${card.name}</div>
                <div style="font-size: 20px;">${'⭐'.repeat(card.stars)}</div>
                <div>Рейтинг: ${card.rating}</div>
            `;
            tg.showAlert(`🎴 ${card.name} (${'⭐'.repeat(card.stars)})`);
            updateTimer();
        }
        
        function showCollection() {
            let data = getData();
            let collection = data.collection;
            
            if (collection.length === 0) {
                document.getElementById('collectionGrid').innerHTML = '<p>📭 Нет карточек. Открой пак!</p>';
                return;
            }
            
            let html = '';
            collection.forEach(card => {
                html += `
                    <div class="collection-card">
                        <img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">
                        <div class="name">${card.name}</div>
                        <div style="font-size: 10px;">${'⭐'.repeat(card.stars)}</div>
                    </div>
                `;
            });
            document.getElementById('collectionGrid').innerHTML = html;
        }
        
        function updateTimer() {
            let last = getData().lastOpen;
            let now = Date.now();
            let timer = document.getElementById('timer');
            if (last && now - last < 3600000) {
                let left = 3600000 - (now - last);
                timer.textContent = `⏱️ Через ${Math.floor(left/60000)}:${Math.floor((left%60000)/1000).toString().padStart(2,'0')}`;
            } else timer.textContent = '✅ Пак доступен';
        }
        
        function showSection(s) {
            document.getElementById('packSection').classList.add('hidden');
            document.getElementById('collectionSection').classList.add('hidden');
            document.getElementById('pvpSection').classList.add('hidden');
            document.getElementById(s + 'Section').classList.remove('hidden');
            if (s === 'collection') showCollection();
            if (s === 'pack') updateTimer();
            if (s === 'pvp') loadPvPCollection();
            document.querySelectorAll('.menu-btn').forEach((btn, i) => {
                let sections = ['pack', 'collection', 'pvp'];
                btn.classList.toggle('active', sections[i] === s);
            });
        }
        
        // ========== PVP С ВЫБОРОМ 3 ИГРОКОВ ==========
        function loadPvPCollection() {
            let data = getData();
            let collection = data.collection;
            
            if (collection.length === 0) {
                document.getElementById('pvpCollectionGrid').innerHTML = '<p>📭 Нет карточек. Открой паки!</p>';
                return;
            }
            
            let html = '';
            collection.forEach((card, index) => {
                let isSelected = selectedPlayers.some(p => p.name === card.name);
                html += `
                    <div class="collection-card ${isSelected ? 'selected' : ''}" onclick="togglePlayer('${card.name}', ${card.rating}, '${card.img}', ${card.stars})">
                        <img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'">
                        <div class="name">${card.name}</div>
                        <div style="font-size: 10px;">${'⭐'.repeat(card.stars)} (${card.rating})</div>
                        ${isSelected ? '<div class="selected-mark">✓</div>' : ''}
                    </div>
                `;
            });
            document.getElementById('pvpCollectionGrid').innerHTML = html;
            updateSelectedDisplay();
        }
        
        function togglePlayer(name, rating, img, stars) {
            let existing = selectedPlayers.find(p => p.name === name);
            if (existing) {
                selectedPlayers = selectedPlayers.filter(p => p.name !== name);
            } else {
                if (selectedPlayers.length >= 3) {
                    tg.showAlert('Можно выбрать только 3 игроков!');
                    return;
                }
                selectedPlayers.push({ name, rating, img, stars });
            }
            loadPvPCollection();
        }
        
        function updateSelectedDisplay() {
            document.getElementById('selectedCount').innerText = selectedPlayers.length;
            if (selectedPlayers.length === 0) {
                document.getElementById('selectedPlayersList').innerHTML = '';
                return;
            }
            let html = '<div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">';
            selectedPlayers.forEach(p => {
                html += `
                    <div style="background: #1a2a4a; padding: 5px 10px; border-radius: 20px;">
                        ${p.name} (${p.rating})
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('selectedPlayersList').innerHTML = html;
        }
        
        function generateGoals(team, totalGoals) {
            let goals = [];
            let remaining = totalGoals;
            for (let i = 0; i < team.length; i++) {
                let maxGoals = Math.min(remaining, team.length === 1 ? remaining : Math.floor(Math.random() * (remaining + 1)));
                if (i === team.length - 1) maxGoals = remaining;
                let playerGoals = Math.floor(Math.random() * (maxGoals + 1));
                if (playerGoals > 0) {
                    goals.push({ name: team[i].name, goals: playerGoals });
                }
                remaining -= playerGoals;
                if (remaining === 0) break;
            }
            return goals;
        }
        
        function startMatch() {
            if (selectedPlayers.length !== 3) {
                tg.showAlert('Выбери ровно 3 игроков!');
                return;
            }
            
            let myPower = selectedPlayers.reduce((sum, p) => sum + p.rating, 0);
            
            // Бот выбирает 3 случайных игроков из allCards
            let shuffled = [...allCards];
            for (let i = shuffled.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            let botTeam = shuffled.slice(0, 3);
            let botPower = botTeam.reduce((sum, p) => sum + p.rating, 0);
            
            // Определяем победителя и счёт
            let myScore, botScore;
            let resultText = '';
            let resultClass = '';
            
            if (myPower > botPower) {
                myScore = Math.floor(Math.random() * 3) + 2; // 2-4 гола
                botScore = Math.floor(Math.random() * 2);   // 0-1 гол
                resultText = '🏆 ПОБЕДА!';
                resultClass = 'win';
                let wins = parseInt(localStorage.getItem('pvp_wins') || '0');
                localStorage.setItem('pvp_wins', wins + 1);
            } else if (myPower < botPower) {
                myScore = Math.floor(Math.random() * 2);     // 0-1 гол
                botScore = Math.floor(Math.random() * 3) + 2; // 2-4 гола
                resultText = '😔 ПОРАЖЕНИЕ';
                resultClass = 'lose';
                let losses = parseInt(localStorage.getItem('pvp_losses') || '0');
                localStorage.setItem('pvp_losses', losses + 1);
            } else {
                myScore = Math.floor(Math.random() * 2) + 1;  // 1-2 гола
                botScore = Math.floor(Math.random() * 2) + 1;  // 1-2 гола
                resultText = '🤝 НИЧЬЯ!';
                resultClass = 'draw';
            }
            
            // Генерация голов
            let myGoals = generateGoals(selectedPlayers, myScore);
            let botGoals = generateGoals(botTeam, botScore);
            
            let myTeamHtml = selectedPlayers.map(p => `
                <div class="team-card">
                    <img src="${p.img}" onerror="this.style.display='none'">
                    <div style="font-size: 10px;">${p.name}</div>
                    <div>${'⭐'.repeat(p.stars)}</div>
                </div>
            `).join('');
            
            let botTeamHtml = botTeam.map(p => `
                <div class="team-card">
                    <img src="${p.img}" onerror="this.style.display='none'">
                    <div style="font-size: 10px;">${p.name}</div>
                    <div>${'⭐'.repeat(p.stars)}</div>
                </div>
            `).join('');
            
            let myGoalsHtml = myGoals.length > 0 ? myGoals.map(g => `${g.name} — ${g.goals}⚽`).join('<br>') : '⚽ Нет голов';
            let botGoalsHtml = botGoals.length > 0 ? botGoals.map(g => `${g.name} — ${g.goals}⚽`).join('<br>') : '⚽ Нет голов';
            
            let wins = localStorage.getItem('pvp_wins') || '0';
            let losses = localStorage.getItem('pvp_losses') || '0';
            
            document.getElementById('matchResult').innerHTML = `
                <div>
                    <h3>ТВОЯ КОМАНДА</h3>
                    <div class="team-area">${myTeamHtml}</div>
                    <div>💪 Суммарная сила: ${myPower}</div>
                    <div class="goal-list"><b>⚽ Голы:</b><br>${myGoalsHtml}</div>
                </div>
                <div class="vs">${myScore} : ${botScore}</div>
                <div style="margin-top: 15px;">
                    <h3>КОМАНДА СОПЕРНИКА</h3>
                    <div class="team-area">${botTeamHtml}</div>
                    <div>💪 Суммарная сила: ${botPower}</div>
                    <div class="goal-list"><b>⚽ Голы:</b><br>${botGoalsHtml}</div>
                </div>
                <div style="margin-top: 20px; font-size: 24px; font-weight: bold; color: ${resultClass === 'win' ? '#4caf50' : (resultClass === 'lose' ? '#f44336' : '#ffd966')}">
                    ${resultText}
                </div>
                <div style="margin-top: 10px;">🏆 Побед: ${wins} | 😔 Поражений: ${losses}</div>
            `;
        }
        
        updateTimer();
        setInterval(updateTimer, 1000);
        showSection('pack');
    </script>
</body>
  </html>
